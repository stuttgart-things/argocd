---
name: Verify Helm Charts
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.find.outputs.charts }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        name: Find all Chart.yaml directories
        run: |
          charts=$(find apps cicd config infra -name Chart.yaml -printf '%h\n' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "charts=${charts}" >> "$GITHUB_OUTPUT"
          echo "Discovered charts:"
          echo "${charts}" | jq -r '.[]'

  verify:
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.discover.outputs.charts) }}
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-helm-verify.yaml@main
    with:
      chart-path: ${{ matrix.chart }}
    secrets: inherit

  validate-schemas:
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-validate-json-schema.yaml@main
    secrets: inherit
