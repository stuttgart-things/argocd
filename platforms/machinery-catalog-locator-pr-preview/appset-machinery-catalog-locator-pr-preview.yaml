---
# Per-PR preview environments for stuttgart-things/machinery-catalog-locator.
#
# Mirrors platforms/machinery-pr-preview, adapted for catalog-locator. Fans
# out across (clusters labelled machinery-catalog-locator-pr-preview: "true")
# × (open PRs on machinery-catalog-locator carrying the `preview` label). One
# parent Application per (cluster, PR) cell, rendering the
# apps/machinery-catalog-locator/install chart with PR-specific values.
#
# Reviewer flow:
#   1. Open a PR on stuttgart-things/machinery-catalog-locator, label `preview`.
#   2. push-kustomize-pr.yaml in that repo publishes
#      ghcr.io/stuttgart-things/machinery-catalog-locator:pr-<n>-<sha>
#      ghcr.io/stuttgart-things/machinery-catalog-locator-kustomize:pr-<n>-<sha>
#   3. This AppSet picks the PR up on its next 600s requeue, renders an
#      Application that deploys those artifacts into namespace
#      `machinery-catalog-locator-pr-<n>` on every labelled cluster.
#   4. comment-preview-url.yaml posts the URL on the PR.
#   5. On PR close, Argo prunes the Application (finalizer below) and
#      cleanup-pr-artifacts.yaml deletes the OCI tags.
#
# Difference from machinery: catalog-locator reads Git (resolves the catalog,
# opens PRs to remove resources), not the cluster API — so there is NO
# `config`/`rbac` cluster-watch block here. Instead it needs GitHub
# credentials (see the `github` block in valuesObject).
#
# Prereqs not declared here:
#   - Secret `homerun2-omni-pitcher-pat` in argocd ns on the management
#     cluster (reused — covers any public stuttgart-things repo). Used by the
#     pullRequest generator below to read PRs.
#   - GitHub App PEM Secret `machinery-catalog-locator-github-app` present in
#     each per-PR namespace on the target cluster (materialized out-of-band:
#     ESO / Kyverno generate / pre-applied). catalog-locator refuses to start
#     without GitHub credentials. To use the PAT path instead, drop the
#     App fields and set github.tokenSecret.name (see install/values.yaml).
#   - Target cluster registered as an Argo cluster with label
#     machinery-catalog-locator-pr-preview: "true" (and matching AppProject of
#     same name).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: machinery-catalog-locator-pr-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  machinery-catalog-locator-pr-preview: "true"
          - pullRequest:
              github:
                owner: stuttgart-things
                repo: machinery-catalog-locator
                tokenRef:
                  secretName: homerun2-omni-pitcher-pat
                  key: token
                # PRs must carry the `preview` label to spin up an env.
                labels:
                  - preview
              requeueAfterSeconds: 600
  template:
    metadata:
      # `-platform` suffix on the parent Application so it does not collide
      # with the chart-rendered child Application (named via
      # valuesObject.applicationName: machinery-catalog-locator-pr-<n>).
      # See platforms/machinery-pr-preview for the full rationale.
      name: 'machinery-catalog-locator-pr-{{ .number }}-platform'
      labels:
        machinery-catalog-locator.stuttgart-things.com/pr: '{{ .number }}'
      # Cascading teardown on PR close — Argo prunes managed resources before
      # the parent Application is removed.
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{ .name }}'
      # Parent App = the rendered install chart. Its output is more Argo
      # Application CRDs, which must land in argocd ns on the management
      # cluster (in-cluster from Argo's POV).
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: apps/machinery-catalog-locator/install
        helm:
          releaseName: 'machinery-catalog-locator-pr-{{ .number }}'
          valuesObject:
            applicationName: 'machinery-catalog-locator-pr-{{ .number }}'
            project: '{{ .name }}'
            # Target the labelled remote cluster, not the management one.
            destination:
              server: '{{ .server }}'
              namespace: 'machinery-catalog-locator-pr-{{ .number }}'

            # Per-PR artifacts. push-kustomize-pr.yaml tags both image +
            # kustomize OCI as `pr-<number>-<full-sha>`, matching `.head_sha`.
            kustomize:
              repoURL: ghcr.io/stuttgart-things/machinery-catalog-locator-kustomize
              targetRevision: 'pr-{{ .number }}-{{ .head_sha }}'
            image:
              repository: ghcr.io/stuttgart-things/machinery-catalog-locator
              tag: 'pr-{{ .number }}-{{ .head_sha }}'

            # GitHub App credentials for the catalog-locator workload. The App
            # IDs are not secret and are inlined; the PEM is provisioned into
            # the per-PR namespace by the externalSecrets sub-App below (ESO
            # pulls it from Vault), then mounted via privateKeySecret.
            #
            # TODO(maintainer): set the real GitHub App ID + installation ID
            # for the App that has read access to the target catalog repo.
            github:
              appID: "000000"
              installationID: "00000000"
              privateKeySecret:
                name: machinery-catalog-locator-github-app
                key: private-key.pem

            # ESO provisions the PEM Secret (above) per preview namespace,
            # pulling `private-key.pem` from Vault via the dedicated
            # `vault-machinery-catalog-locator` ClusterSecretStore (deployed
            # per cluster from stuttgart-things/stuttgart-things). Runs at
            # sync-wave -10 so the Secret exists before the Pod boots.
            externalSecrets:
              enabled: true
              secretName: machinery-catalog-locator-github-app
              store:
                name: vault-machinery-catalog-locator
                kind: ClusterSecretStore
              secretPath: machinery-catalog-locator-github-app
              keys:
                - private-key.pem

            httpRoute:
              enabled: true
              hostname: 'machinery-catalog-locator-pr-{{ .number }}.homerun2-dev.sthings-vsphere.labul.sva.de'
              gateway:
                name: homerun2-dev-gateway
                namespace: default

            grpcRoute:
              enabled: true
              hostname: 'machinery-catalog-locator-pr-{{ .number }}-grpc.homerun2-dev.sthings-vsphere.labul.sva.de'
              gateway:
                name: homerun2-dev-gateway
                namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
