---
# Bootstrap Application for the homerun2 PR-preview platform bundle.
# Apply once on the management cluster (the one running Argo CD):
#   kubectl apply -f platforms/homerun2-pr-preview/application.yaml
#
# It renders platforms/homerun2-pr-preview/ via kustomize (the
# kustomization.yaml in that directory lists the ApplicationSets).
# ApplicationSets then fan out to every cluster Secret labelled
# `homerun2-pr-preview: "true"`.
#
# This file itself is intentionally NOT listed in kustomization.yaml so
# the rendered set does not contain the bootstrap Application (no
# self-reference).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homerun2-pr-preview-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stuttgart-things/argocd.git
    targetRevision: main
    path: platforms/homerun2-pr-preview
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
