---
# Per-PR preview environments for stuttgart-things/homerun2-led-catcher.
#
# Fans out across (clusters labelled homerun2-pr-preview: "true") ×
# (open PRs on homerun2-led-catcher carrying the `preview` label).
# led-catcher is a Redis Streams → 64x64 RGB LED matrix consumer with
# an embedded HTMX web simulator. Its preview ships with omni-pitcher
# + redis-stack co-tenanted so reviewers can pitch events and see them
# surface in the web simulator (and on real hardware if the PR is wired
# to one). A seed-data Job posts an initial fixture so the simulator
# isn't empty on first load.
#
# Decisions from stuttgart-things/homerun2-omni-pitcher#116 step 3:
#   - namespace: `homerun2-led-catcher-pr-<num>` (image-name-mirrored)
#   - hostnames:
#     * `led-pr-<num>`         — led-catcher web simulator
#     * `omni-led-pr-<num>`    — co-tenanted omni-pitcher (distinct
#                                 from `omni-pr-<num>`, `omni-cc-pr-<num>`,
#                                 `omni-scout-pr-<num>`, `omni-demo-pr-<num>`)
#     * `demo-led-pr-<num>`    — co-tenanted demo-pitcher UI so reviewers
#                                 can compose + send custom messages and
#                                 see them surface on the LED simulator
#   - omni-pitcher pinned to v1.11.1 (latest released, Option-B-enabled)
#   - demo-pitcher pinned to v1.4.0 (chart default)
#   - GitHub PAT reused — homerun2-omni-pitcher-pat covers any public
#     stuttgart-things repo
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homerun2-led-catcher-pr-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  homerun2-pr-preview: "true"
          - pullRequest:
              github:
                owner: stuttgart-things
                repo: homerun2-led-catcher
                tokenRef:
                  secretName: homerun2-omni-pitcher-pat
                  key: token
                labels:
                  - preview
              requeueAfterSeconds: 600
  template:
    metadata:
      name: 'homerun2-led-catcher-pr-{{ .number }}'
      labels:
        homerun2.stuttgart-things.com/pr: '{{ .number }}'
        homerun2.stuttgart-things.com/component: led-catcher
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: apps/homerun2/install
        helm:
          releaseName: 'homerun2-led-catcher-pr-{{ .number }}'
          valuesObject:
            applicationName: 'homerun2-led-catcher-pr-{{ .number }}'
            project: '{{ .name }}'
            destination:
              name: '{{ .name }}'
              namespace: 'homerun2-led-catcher-pr-{{ .number }}'

            # SUT: led-catcher at the PR's commit. `inlineHttpRoute: true`
            # opts into Option B (kustomize OCI ships HTTPRoute alongside
            # Service); the chart patches parentRef + hostname per env (see
            # apps/homerun2/install/templates/led-catcher.yaml).
            ledCatcher:
              enabled: true
              version: 'pr-{{ .number }}-{{ .head_sha }}'
              hostname: 'led-pr-{{ .number }}.homerun2-dev.sthings-vsphere.labul.sva.de'
              inlineHttpRoute: true

            # Co-tenanted: omni-pitcher pinned to v1.11.1 (latest released,
            # Option-B-enabled). Receives /pitch POSTs from the seed Job and
            # any manual reviewer pitches (via demo-pitcher UI or direct
            # curl), writes to redis-stack.
            omniPitcher:
              enabled: true
              version: v1.11.1
              hostname: 'omni-led-pr-{{ .number }}.homerun2-dev.sthings-vsphere.labul.sva.de'
              inlineHttpRoute: true

            # Co-tenanted: demo-pitcher UI. Pinned to v1.8.1 — the chart's
            # default of v1.4.0 predates demo-pitcher's kustomize OCI
            # publishing, so it 404s on the ghcr.io lookup. v1.8.1 is the
            # current latest release with both image + kustomize OCI.
            # omniPitcherUrl flips the Deployment env to PITCH_TARGET=http +
            # OMNI_PITCHER_URL=<in-cluster service> so the UI's "Pitch"
            # button POSTs to the co-tenanted omni-pitcher (instead of the
            # compiled-in localhost:4000 fallback the UI otherwise surfaces).
            # Full chain: demo /pitch → omni-pitcher /pitch/generic →
            # redis-stack stream → led-catcher web simulator.
            demoPitcher:
              enabled: true
              version: v1.8.1
              hostname: 'demo-led-pr-{{ .number }}.homerun2-dev.sthings-vsphere.labul.sva.de'
              inlineHttpRoute: true
              omniPitcherUrl: 'http://homerun2-omni-pitcher.homerun2-led-catcher-pr-{{ .number }}.svc.cluster.local'

            # Co-tenanted: redis-stack. Same ESO-managed password Secret
            # the preview-secrets policy materializes per namespace.
            redisStack:
              enabled: true
              persistence:
                enabled: false
              auth:
                existingSecret: redis-stack-auth

            # Everything else off.
            coreCatcher:  { enabled: false }
            scout:        { enabled: false }
            k8sPitcher:   { enabled: false }
            lightCatcher: { enabled: false }
            wledMock:     { enabled: false }
            gitPitcher:   { enabled: false }

            httpRoute:
              enabled: true
              gateway:
                name: homerun2-dev-gateway
                namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
