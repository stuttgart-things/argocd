apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno-install-security
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  # Keep child resources if the cluster opts out later. Without this, dropping
  # out would delete the child Application and prune the CRDs / namespace it
  # manages — taking every ClusterPolicy, Policy, PolicyException with it.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            security-platform: "true"
            security-platform/kyverno: "true"
  template:
    metadata:
      name: kyverno-install-security-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: '{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: infra/kyverno/install
        helm:
          valuesObject:
            project: '{{ .name }}'
            # Override the chart's default child-Application name (sha8 of
            # destination.server) so the inner Application carries the
            # `-security` suffix and never collides with a per-cluster overlay
            # that may also reference infra/kyverno/install.
            applicationName: kyverno-security-{{ .name }}
            destination:
              server: '{{ .server }}'
              namespace: kyverno
            # Extend the cleanup-controller's RBAC so it can delete
            # Namespaces — needed by `ClusterCleanupPolicy` sweeps that
            # target abandoned namespace shells. Kyverno's default RBAC
            # excludes Namespace deletion as a safety-by-default; the
            # cleanup controller's admission webhook rejects policies
            # that would otherwise delete a kind it has no permission
            # for. Granting it here keeps the security-platform bundle
            # self-contained.
            #
            # Path note: chart values list both `coreClusterRole` and
            # `clusterRole` under `cleanupController.rbac`, but in
            # kyverno chart 3.8.0 only the latter is actually consumed
            # by the cleanup-controller's clusterrole.yaml template.
            # `coreClusterRole.extraResources` is wired for admission/
            # background/reports controllers but not cleanup — using
            # `clusterRole.extraResources` here is the working path.
            extraValues:
              cleanupController:
                rbac:
                  clusterRole:
                    extraResources:
                      - apiGroups: [""]
                        resources: ["namespaces"]
                        verbs: ["get", "list", "watch", "delete"]
              # Background-controller's RBAC needs `external-secrets.io`
              # CRD verbs so `generate` rules can produce ExternalSecret
              # resources. Kyverno's admission webhook validates the
              # background-controller's permissions when a ClusterPolicy
              # with a `generate` rule is created and rejects the policy
              # otherwise. Granting it here keeps the security-platform
              # bundle self-contained for ESO-driven policies (e.g.
              # `apps/homerun2/preview-secrets`).
              backgroundController:
                rbac:
                  coreClusterRole:
                    extraResources:
                      - apiGroups: ["external-secrets.io"]
                        resources: ["externalsecrets"]
                        verbs: ["create", "update", "patch", "delete"]
                      # Required by the `homerun2-preview-quota` ClusterPolicy
                      # to auto-generate per-namespace ResourceQuota +
                      # LimitRange. Without these, the policy silently
                      # produces nothing (background-controller is the actor
                      # for `generate` rules — admission webhook validates
                      # its permissions against the generated kind).
                      - apiGroups: [""]
                        resources: ["resourcequotas", "limitranges"]
                        verbs: ["create", "update", "patch", "delete"]
                      # Required by `homerun2-preview-seed-data` to generate
                      # a one-shot Job per PR namespace that posts a curated
                      # event fixture to omni-pitcher's /pitch endpoint.
                      - apiGroups: ["batch"]
                        resources: ["jobs"]
                        verbs: ["create", "update", "patch", "delete"]
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
