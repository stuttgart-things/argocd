# CAPABILITY: ansible — Ansible runtime for crossplane (ansible-run
# EnvironmentConfig, tekton-ci ManagedNamespace, scoped provider-kubernetes RBAC,
# and the ansible-credentials ESO wiring).
#
# Its own capability — NOT folded into vspherevm — because ansible is used
# standalone and by other crossplane use cases, not only for configuring built
# VMs. A cluster opts in independently:
#     cicd-platform/crossplane-ansible: "true"
#
# TWO ApplicationSets (like vspherevm/proxmoxvm):
#   - platform config is ENV-keyed   -> --set environment=<env> (chart env-map)
#   - XRs are CLUSTER-keyed          -> crossplane/xrs/ansiblerun/<env>/<cluster>/
# Config is env-keyed (chart env-map), like every other platform component.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane-platform-ansible-cicd
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    # env comes from the cluster's `env` label; the chart carries all per-env
    # config under environments.<env> (selected via the `environment` parameter
    # below), so no git files generator / vars/<env>.yaml lookup.
    - clusters:
        selector:
          matchLabels:
            cicd-platform/crossplane-ansible: "true"
  template:
    metadata:
      name: 'cxp-platform-ansible-{{ .name }}'
      annotations:
        # Wave 1: after baseline (wave 0). Independent of vspherevm.
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: '{{ .name }}'
      destination:
        server: '{{ .server }}'
        namespace: crossplane-system
      source:
        repoURL: https://github.com/stuttgart-things/stuttgart-things.git
        targetRevision: main
        path: 'crossplane/platform/capabilities/ansible'
        helm:
          releaseName: 'cxp-ansible-{{ .name }}'
          parameters:
            # Select the chart's environments.<env> block from the cluster label.
            - name: environment
              value: '{{ index .metadata.labels "env" | lower }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane-xrs-ansible-cicd
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  cicd-platform/crossplane-ansible: "true"
          - git:
              repoURL: https://github.com/stuttgart-things/stuttgart-things.git
              revision: main
              # Concrete XR instances are plain manifests (applied as a directory
              # source — no kustomization.yaml needed), one folder
              # PER OWNING CLUSTER, grouped by env:
              #   crossplane/xrs/ansiblerun/<env>/<cluster>/
              # env mirrors the platform tree and guards against misfiling (a
              # folder under the wrong env won't match this cluster). A cluster
              # with the capability but no folder gets the ansible runtime but no
              # AnsibleRuns yet (finer opt-in). `.name` is the ArgoCD cluster name.
              directories:
                - path: 'crossplane/xrs/ansiblerun/{{ index .metadata.labels "env" | lower }}/{{ .name }}'
  template:
    metadata:
      name: 'cxp-xr-ansible-{{ .name }}'
      annotations:
        # Wave 2: after the ansible runtime (wave 1) so the EnvironmentConfig /
        # ManagedNamespace / RBAC the AnsibleRuns depend on already exist.
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: '{{ .name }}'
      destination:
        server: '{{ .server }}'
        namespace: crossplane-system
      source:
        repoURL: https://github.com/stuttgart-things/stuttgart-things.git
        targetRevision: main
        path: '{{ .path.path }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
