apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-cicd
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            cicd-platform: "true"
          matchExpressions:
            - key: cicd-platform/kargo
              operator: NotIn
              values: ["false"]
  template:
    metadata:
      name: kargo-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: '{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: cicd/kargo/install
        helm:
          valuesObject:
            project: '{{ .name }}'
            destination:
              server: '{{ .server }}'
              namespace: kargo
            # Derive external hostname from the cluster's clusterbook FQDN
            # annotation (e.g. "*.philly.sthings-vsphere.labul.sva.de" →
            # "kargo.philly.sthings-vsphere.labul.sva.de"). Must match the
            # HTTPRoute hostname + certificate SAN — kargo's API performs a
            # cookie Host check against this. Falls back to the chart default
            # "kargo.example.com" on clusters without the annotation.
            api:
              host: 'kargo.{{ index .metadata.annotations "clusterbook.stuttgart-things.com/fqdn" | trimPrefix "*." | default "example.com" }}'
            # Tell the upstream chart to consume an existing Secret named
            # `kargo-admin` in the kargo namespace instead of rendering its
            # own from inline passwordHash/tokenSigningKey values. The chart
            # guards its Secret template with `{{ if not .Values.api.secret.name }}`
            # — setting this key suppresses the render AND the required check.
            # The api Deployment's envFrom.secretRef.name falls back to this
            # value too, so one knob does both.
            #
            # Keys expected in the Secret: ADMIN_ACCOUNT_PASSWORD_HASH
            # (bcrypt, $2a$ variant) + ADMIN_ACCOUNT_TOKEN_SIGNING_KEY (32
            # chars). Created per-cluster out-of-band (see platform README).
            extraValues:
              api:
                secret:
                  name: kargo-admin
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
