# CAPABILITY: vspherevm — "this cluster builds vSphere VMs".
#
# A capability is the use-case unit that diverges between crossplane management
# clusters. vspherevm bundles the provider-level config (the vspherevm
# Configuration, its ClusterProviderConfig, the placement EnvironmentConfig, and
# the vsphere-creds ESO wiring) AND the concrete XRs (NativeVsphereVM claims) that
# exercise it.
#
# OPT-IN (unlike baseline, which is opt-out): a cluster gets this capability iff
# its Secret carries
#     cicd-platform/crossplane-vspherevm: "true"
# This is the knob that selects provider config by planned cluster usage.
#
# TWO INDEPENDENT AXES:
#   - platform config is ENV-keyed   -> vars/<env>.yaml  (reusable per env)
#   - XRs are CLUSTER-keyed          -> xrs/.../<cluster> (concrete per-cluster
#     intent; two clusters in the same env each own a separate folder, so
#     ownership is unambiguous — no shared/duplicated claims)
#
# To add another capability, copy this file to appset-cxp-<cap>.yaml, swap the
# label key + the monorepo paths, and register it in kustomization.yaml.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane-platform-vspherevm-cicd
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  cicd-platform/crossplane-vspherevm: "true"
          - git:
              repoURL: https://github.com/stuttgart-things/stuttgart-things.git
              revision: main
              files:
                - path: 'crossplane/platform/capabilities/vspherevm/vars/{{ index .metadata.labels "env" | lower }}.yaml'
  template:
    metadata:
      name: 'cxp-platform-vspherevm-{{ .name }}'
      annotations:
        # Wave 1: after baseline (wave 0); before this capability's XRs (wave 2).
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: '{{ .name }}'
      destination:
        server: '{{ .server }}'
        namespace: crossplane-system
      source:
        repoURL: https://github.com/stuttgart-things/stuttgart-things.git
        targetRevision: main
        path: '{{ trimSuffix "/vars" .path.path }}'
        helm:
          releaseName: 'cxp-vspherevm-{{ .name }}'
          valueFiles:
            - 'vars/{{ index .metadata.labels "env" | lower }}.yaml'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane-xrs-vspherevm-cicd
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  cicd-platform/crossplane-vspherevm: "true"
          - git:
              repoURL: https://github.com/stuttgart-things/stuttgart-things.git
              revision: main
              # Concrete XR instances are plain manifests (applied as a directory
              # source — no kustomization.yaml needed), one folder
              # PER OWNING CLUSTER, grouped by env:
              #   crossplane/xrs/vspherevm/<env>/<cluster>/
              # env mirrors the platform tree and guards against misfiling (a
              # folder under the wrong env won't match this cluster). A cluster
              # with the capability but no folder gets the provider config but no
              # claims yet (finer opt-in). `.name` is the ArgoCD cluster name.
              directories:
                - path: 'crossplane/xrs/vspherevm/{{ index .metadata.labels "env" | lower }}/{{ .name }}'
  template:
    metadata:
      name: 'cxp-xr-vspherevm-{{ .name }}'
      annotations:
        # Wave 2: after the capability's provider config (wave 1) so the
        # ProviderConfig / EnvironmentConfig the XRs depend on already exist.
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: '{{ .name }}'
      destination:
        server: '{{ .server }}'
        namespace: crossplane-system
      source:
        repoURL: https://github.com/stuttgart-things/stuttgart-things.git
        targetRevision: main
        path: '{{ .path.path }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
