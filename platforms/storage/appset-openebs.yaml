apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openebs-storage
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  # Keep child resources if the cluster opts out later (label → "false").
  # Without this, dropping out would delete the child Application and prune
  # the StorageClass / DaemonSets / namespace it manages.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            storage-platform: "true"
          matchExpressions:
            - key: storage-platform/openebs
              operator: NotIn
              values: ["false"]
  template:
    metadata:
      # Distinct from platforms/cicd/appset-openebs.yaml's `openebs-{{ .name }}`
      # so a cluster carrying BOTH `cicd-platform: "true"` and
      # `storage-platform: "true"` doesn't produce two ApplicationSets fighting
      # over the same parent Application name. Note: the workload-cluster
      # OpenEBS install itself is still a singleton — opt out of one platform's
      # openebs (e.g. `storage-platform/openebs: "false"`) on dual-platform
      # clusters to avoid two parallel installs racing on the same StorageClass /
      # DaemonSets / namespace.
      name: openebs-storage-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: '{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: infra/openebs/install
        helm:
          valuesObject:
            project: '{{ .name }}'
            # Child (inner) Application name. MUST differ from this AppSet's own
            # parent Application name (openebs-storage-<cluster>): if they are
            # equal, the parent renders an Application of its own name — a
            # self-collision that leaves the parent perpetually OutOfSync and
            # OpenEBS never actually deployed. Kept distinct from the
            # cicd-platform child too (openebs-<sha8> / openebs-<cluster>) so
            # dual-platform clusters don't clash.
            applicationName: openebs-storage-install-{{ .name }}
            destination:
              server: '{{ .server }}'
              namespace: openebs
            # openebs-crds is the single cluster-wide owner of the VolumeSnapshot
            # CRDs; the nfs-csi snapshot-controller (csi-driver-nfs) deliberately
            # ships with its own CRD install OFF and defers to openebs-crds.
            # Enable here so storage-platform clusters running both get the CRDs
            # and the snapshot-controller stops crash-looping on the missing API.
            volumeSnapshots:
              enabled: true
            # storage platform expects openebs-hostpath to be the cluster's
            # default StorageClass. Without this, PVCs created on the target
            # cluster without an explicit storageClassName would stay Pending
            # forever.
            defaultStorageClass: true
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
