apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openebs-storage
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  # Keep child resources if the cluster opts out later (label → "false").
  # Without this, dropping out would delete the child Application and prune
  # the StorageClass / DaemonSets / namespace it manages.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            storage-platform: "true"
          matchExpressions:
            - key: storage-platform/openebs
              operator: NotIn
              values: ["false"]
  template:
    metadata:
      # Distinct from platforms/cicd/appset-openebs.yaml's `openebs-{{ .name }}`
      # so a cluster carrying BOTH `cicd-platform: "true"` and
      # `storage-platform: "true"` doesn't produce two ApplicationSets fighting
      # over the same parent Application name. Note: the workload-cluster
      # OpenEBS install itself is still a singleton — opt out of one platform's
      # openebs (e.g. `storage-platform/openebs: "false"`) on dual-platform
      # clusters to avoid two parallel installs racing on the same StorageClass /
      # DaemonSets / namespace.
      name: openebs-storage-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: '{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: infra/openebs/install
        helm:
          valuesObject:
            project: '{{ .name }}'
            # Override the chart's default child-Application name (sha8 of
            # destination.server) so the inner Application also carries the
            # `-storage` suffix and never collides with the cicd-platform one.
            # Must stay DISTINCT from this parent's metadata.name
            # (openebs-storage-{{ .name }}); reusing the parent name makes the
            # parent manage an Application of its own name+namespace — a
            # self-collision that leaves it perpetually OutOfSync and never
            # installs OpenEBS. Hence the `-install` suffix.
            applicationName: openebs-storage-{{ .name }}-install
            destination:
              server: '{{ .server }}'
              namespace: openebs
            # storage platform expects openebs-hostpath to be the cluster's
            # default StorageClass. Without this, PVCs created on the target
            # cluster without an explicit storageClassName would stay Pending
            # forever.
            defaultStorageClass: true
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
