---
# Bootstrap Application for the storage platform bundle.
# Apply once on the management cluster (the one running Argo CD):
#   kubectl apply -f platforms/storage/application.yaml
#
# It renders platforms/storage/ via kustomize (the kustomization.yaml in that
# directory lists the ApplicationSets). ApplicationSets then fan out to every
# cluster Secret labelled `storage-platform: "true"`.
#
# This file itself is intentionally NOT listed in kustomization.yaml so the
# rendered set does not contain the bootstrap Application (no self-reference).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stuttgart-things/argocd.git
    targetRevision: main
    path: platforms/storage
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
