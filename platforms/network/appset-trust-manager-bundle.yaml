apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: trust-manager-bundle-clusterbook
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            network-platform: "true"
          matchExpressions:
            - key: clusterbook.stuttgart-things.com/allocation-ip
              operator: Exists
            - key: network-platform/trust-manager-bundle
              operator: NotIn
              values: ["false"]
  template:
    metadata:
      name: trust-manager-bundle-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "4"
    spec:
      project: '{{ .name }}'
      destination:
        name: '{{ .name }}'
        namespace: cert-manager
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        # renovate: datasource=github-tags depName=stuttgart-things/argocd
        targetRevision: v0.5.0
        path: infra/trust-manager/bundle
        helm:
          valuesObject:
            # When the cluster has `network-platform/cert-manager-vault-pki=true`
            # the chart appends an extra source pointing at the Vault PKI CA
            # Secret (produced by either the cert-manager-vault-pki AppSet's
            # chart or the create-vault-issuer workflow step). Templated as
            # a quoted string so the manifest stays valid YAML for kustomize
            # build; ArgoCD's goTemplate substitutes the value at App-create
            # time before the chart renders.
            includeVaultPkiCa: '{{ if eq (index .metadata.labels "network-platform/cert-manager-vault-pki") "true" }}true{{ else }}false{{ end }}'
            bundles:
              - name: cluster-trust-bundle
                spec:
                  sources:
                    - useDefaultCAs: true
                    - secret:
                        name: cluster-ca-secret
                        key: ca.crt
                  target:
                    configMap:
                      key: trust-bundle.pem
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - ServerSideApply=true
