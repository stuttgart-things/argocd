apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cert-manager-cluster-ca-clusterbook
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            network-platform: "true"
          matchExpressions:
            - key: clusterbook.stuttgart-things.com/allocation-ip
              operator: Exists
            - key: network-platform/cert-manager-cluster-ca
              operator: NotIn
              values: ["false"]
  template:
    metadata:
      name: cert-manager-cluster-ca-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: '{{ .name }}'
      destination:
        name: '{{ .name }}'
        namespace: cert-manager
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        # renovate: datasource=github-tags depName=stuttgart-things/argocd
        targetRevision: v0.5.0
        path: infra/cert-manager/cluster-ca
        helm:
          values: |
            ca:
              name: cluster-ca
              namespace: cert-manager
              secretName: cluster-ca-secret
              issuerRef:
                kind: ClusterIssuer
                name: selfsigned
            wildcard:
              enabled: true
              name: '{{ .name }}-gateway-tls'
              namespace: default
              secretName: '{{ .name }}-gateway-tls'
              commonName: '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/fqdn" }}'
              dnsNames:
                - '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/fqdn" }}'
              duration: 2160h
              renewBefore: 360h
            {{- if index .metadata.annotations "clusterbook.stuttgart-things.com/wildcard-issuer-name" }}
              issuerRef:
                name: '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/wildcard-issuer-name" }}'
                kind: ClusterIssuer
            {{- end }}
            {{- if index .metadata.annotations "clusterbook.stuttgart-things.com/fqdn-secondary" }}
            wildcardSecondary:
              enabled: true
              name: '{{ .name }}-gateway-tls-secondary'
              namespace: default
              secretName: '{{ .name }}-gateway-tls-secondary'
              commonName: '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/fqdn-secondary" }}'
              dnsNames:
                - '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/fqdn-secondary" }}'
              duration: 2160h
              renewBefore: 360h
            {{- if index .metadata.annotations "clusterbook.stuttgart-things.com/wildcard-issuer-name" }}
              issuerRef:
                name: '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/wildcard-issuer-name" }}'
                kind: ClusterIssuer
            {{- end }}
            {{- end }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - ServerSideApply=true
