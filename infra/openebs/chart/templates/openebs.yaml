{{- $computed := dict }}
{{- $_ := set $computed "preUpgradeHook"  (dict "enabled" .Values.preUpgradeHook.enabled) }}
{{- $_ := set $computed "loki"            (dict "enabled" .Values.loki.enabled) }}
{{- $_ := set $computed "alloy"           (dict "enabled" .Values.alloy.enabled) }}
{{- $_ := set $computed "openebs-crds"    (dict "csi" (dict "volumeSnapshots" (dict "enabled" .Values.volumeSnapshots.enabled))) }}
{{- $_ := set $computed "mayastor"        (dict "csi" (dict "node" (dict "initContainers" (dict "enabled" .Values.mayastorInitContainers.enabled)))) }}
{{- $_ := set $computed "engines"         .Values.engines }}

{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
{{- $defaultName := printf "openebs-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://openebs.github.io/openebs
    chart: openebs
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: openebs
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
