---
{{- $auth := .Values.vault.auth }}
{{- $method := $auth.method | default "token" }}
{{- if not (has $method (list "token" "kubernetes")) }}
  {{- fail (printf "vault.auth.method must be \"token\" or \"kubernetes\", got %q" $method) }}
{{- end }}
{{- if eq $method "kubernetes" }}
  {{- if not $auth.kubernetes }}
    {{- fail "vault.auth.kubernetes is required when vault.auth.method is \"kubernetes\"" }}
  {{- end }}
  {{- if not $auth.kubernetes.role }}
    {{- fail "vault.auth.kubernetes.role is required when vault.auth.method is \"kubernetes\"" }}
  {{- end }}
  {{- if not $auth.kubernetes.mountPath }}
    {{- fail "vault.auth.kubernetes.mountPath is required when vault.auth.method is \"kubernetes\"" }}
  {{- end }}
{{- else }}
  {{- if not (and $auth.tokenSecretRef $auth.tokenSecretRef.name) }}
    {{- fail "vault.auth.tokenSecretRef.name is required when vault.auth.method is \"token\"" }}
  {{- end }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.name | quote }}
spec:
  vault:
    server: {{ .Values.vault.server | quote }}
    path: {{ .Values.vault.path | quote }}
    {{- with .Values.vault.caBundleSecretRef }}
    caBundleSecretRef:
      name: {{ .name | quote }}
      key: {{ .key | quote }}
    {{- end }}
    auth:
      {{- if eq $method "kubernetes" }}
      kubernetes:
        mountPath: {{ $auth.kubernetes.mountPath | quote }}
        role: {{ $auth.kubernetes.role | quote }}
        serviceAccountRef:
          name: {{ $auth.kubernetes.serviceAccountRef.name | default $auth.kubernetes.role | quote }}
      {{- else }}
      tokenSecretRef:
        name: {{ $auth.tokenSecretRef.name | quote }}
        key: {{ $auth.tokenSecretRef.key | default "token" | quote }}
      {{- end }}
