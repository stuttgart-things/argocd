---
# Bootstrap CA certificate signed by the self-signed ClusterIssuer.
# The chart renders: Certificate (ca.name in ca.namespace) →
# ClusterIssuer (same ca.name) backed by the CA's Secret.
ca:
  name: cluster-ca
  namespace: cert-manager
  secretName: cluster-ca-secret
  # ClusterIssuer used to sign the CA certificate. Matches the `selfsigned/`
  # chart's default `name` value; override if you renamed it.
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer

# Optional wildcard Certificate. By default issued by the CA ClusterIssuer
# above (i.e. `ca.name`, selfsigned-chained). Override `wildcard.issuerRef`
# to point at another ClusterIssuer — e.g. `{ name: vault-pki }` to issue
# from Vault PKI. Useful when external clients trust your Vault root CA
# but not your selfsigned cluster CA.
wildcard:
  enabled: false
  name: wildcard-tls
  namespace: default
  secretName: wildcard-tls
  commonName: "*.example.com"
  dnsNames:
    - "*.example.com"
  duration: 2160h      # 90 days
  renewBefore: 360h    # renew 15 days before expiry
  # issuerRef defaults to `{ name: <ca.name>, kind: ClusterIssuer }` when
  # unset. Set explicitly to route the wildcard through a different
  # ClusterIssuer (e.g. vault-pki).
  # issuerRef:
  #   name: vault-pki
  #   kind: ClusterIssuer

# Optional second wildcard Certificate. Mirrors `wildcard` shape (including
# the optional `issuerRef` override) — useful when a cluster fronts more
# than one Gateway hostname (e.g. a secondary clusterbook FQDN). Off by
# default.
wildcardSecondary:
  enabled: false
  name: wildcard-secondary-tls
  namespace: default
  secretName: wildcard-secondary-tls
  commonName: "*.secondary.example.com"
  dnsNames:
    - "*.secondary.example.com"
  duration: 2160h
  renewBefore: 360h
  # issuerRef:
  #   name: vault-pki
  #   kind: ClusterIssuer
