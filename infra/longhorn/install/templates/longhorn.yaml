{{- $computed := dict }}
{{- $_ := set $computed "preUpgradeChecker" (dict
    "jobEnabled" .Values.preUpgradeChecker.jobEnabled
    "upgradeVersionCheck" .Values.preUpgradeChecker.upgradeVersionCheck) }}
{{- $_ := set $computed "persistence" (dict
    "defaultClass" (default false .Values.defaultStorageClass)
    "defaultClassReplicaCount" (int .Values.defaultClassReplicaCount)
    "volumeBindingMode" .Values.volumeBindingMode) }}

{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
{{- $defaultName := printf "longhorn-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: longhorn
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
