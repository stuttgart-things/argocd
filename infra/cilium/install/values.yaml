---
# ArgoCD AppProject the rendered Application belongs to.
project: default

# Where the rendered Application deploys.
destination:
  server: https://kubernetes.default.svc
  namespace: kube-system

# Upstream Cilium Helm chart version (https://helm.cilium.io).
# renovate: datasource=helm depName=cilium registryUrl=https://helm.cilium.io
chartVersion: 1.19.4

# k8s API endpoint used by kubeProxyReplacement. Override per cluster when the
# in-cluster default does not work (e.g. kubeadm with a non-default API VIP).
k8s:
  serviceHost: ""
  servicePort: 6443

# Cilium replaces kube-proxy.
kubeProxyReplacement: true

# Number of cilium-operator replicas.
operatorReplicas: 1

# Enables the `cilium` GatewayClass. Required by the gateway catalog entry
# and by any consumer wanting HTTPRoutes through Cilium.
#
# enableAlpn advertises h2,http/1.1 in the ALPN of every Gateway API HTTPS
# listener. gRPC mandates HTTP/2 and cannot fall back to HTTP/1.1, so without
# this any GRPCRoute on an HTTPS listener is unreachable off-cluster — the TLS
# handshake fails before gRPC frames are exchanged. Enabling it also turns on
# appProtocol support: gRPC backend Services must set
# `appProtocol: kubernetes.io/h2c` for Cilium to speak h2c upstream.
gatewayAPI:
  enabled: true
  enableAlpn: true

# L2 announcements + externalIPs — required by the lb catalog entry for
# LoadBalancer service IPs to be reachable on bare-metal / non-cloud clusters.
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# Deep-merged on top of the computed valuesObject passed to the upstream Cilium chart.
# Use for any upstream key not exposed as a first-class value above.
extraValues: {}

# Sync policy applied to the rendered Application.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m
