---
# Name of the CiliumLoadBalancerIPPool.
poolName: default-pool

# IP blocks advertised by the pool. Each entry supports either `start`/`stop` or `cidr`.
blocks:
  - start: 192.168.1.240
    stop: 192.168.1.250

# CiliumL2AnnouncementPolicy.
l2Policy:
  name: default-l2-announcement-policy
  namespace: kube-system
  externalIPs: true
  loadBalancerIPs: true
