---
# Reference back to this catalog repo — used by the optional lb and gateway
# child Applications to load infra/cilium/lb-chart and infra/cilium/gateway-chart from git.
catalog:
  repoURL: https://github.com/stuttgart-things/argocd.git
  targetRevision: HEAD

# ArgoCD AppProject the rendered Applications belong to.
project: default

# Target workload cluster — shared by every rendered Application.
# Each feature block below sets its own namespace.
destination:
  server: https://kubernetes.default.svc

# Sync policy shared by all rendered Applications.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m

# Install the upstream Cilium Helm chart. Set enabled: false to skip
# (e.g. when Cilium is already running on the cluster) and just opt into
# lb and/or gateway below.
cilium:
  enabled: true
  namespace: kube-system
  # Upstream Cilium Helm chart version (https://helm.cilium.io).
  chartVersion: 1.18.5
  # k8s API endpoint used by kubeProxyReplacement. Override per cluster when the
  # in-cluster default does not work (e.g. kubeadm with a non-default API VIP).
  k8s:
    serviceHost: ""
    servicePort: 6443
  # Cilium replaces kube-proxy.
  kubeProxyReplacement: true
  # Number of cilium-operator replicas.
  operatorReplicas: 1
  # Enables the `cilium` GatewayClass. Required for the gateway opt-in below
  # and for any consumer that wants HTTPRoutes through Cilium.
  gatewayAPI:
    enabled: true
  # L2 announcements + externalIPs — required for LoadBalancer service IPs
  # to be reachable on bare-metal / non-cloud clusters.
  l2announcements:
    enabled: true
  externalIPs:
    enabled: true
  # Deep-merged on top of the computed valuesObject passed to the upstream Cilium chart.
  # Use for any upstream key not exposed as a first-class value above.
  extraValues: {}

# Opt-in CiliumLoadBalancerIPPool + CiliumL2AnnouncementPolicy.
# Safe to enable on clusters where Cilium is already installed
# (set cilium.enabled: false in that case).
lb:
  enabled: false
  poolName: default-pool
  blocks:
    - start: 192.168.1.240
      stop: 192.168.1.250
  l2Policy:
    name: default-l2-announcement-policy
    namespace: kube-system
    externalIPs: true
    loadBalancerIPs: true

# Opt-in Gateway API Gateway. Requires the `cilium` GatewayClass on the cluster
# (either via cilium.gatewayAPI.enabled here, or already provisioned out-of-band).
gateway:
  enabled: false
  name: cilium-gateway
  namespace: default
  gatewayClassName: cilium
  hostname: "*.example.com"
  tlsSecretName: cilium-gateway-tls
