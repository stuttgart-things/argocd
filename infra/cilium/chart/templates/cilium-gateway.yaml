{{- if .Values.gateway.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: infra/cilium/gateway-chart
    helm:
      releaseName: cilium-gateway
      valuesObject:
        name: {{ .Values.gateway.name | quote }}
        namespace: {{ .Values.gateway.namespace | quote }}
        gatewayClassName: {{ .Values.gateway.gatewayClassName | quote }}
        hostname: {{ .Values.gateway.hostname | quote }}
        tlsSecretName: {{ .Values.gateway.tlsSecretName | quote }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.gateway.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
