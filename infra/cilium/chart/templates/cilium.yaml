{{- if .Values.cilium.enabled }}
{{- $computed := dict }}
{{- $_ := set $computed "kubeProxyReplacement" .Values.cilium.kubeProxyReplacement }}
{{- $_ := set $computed "k8sServiceHost" .Values.cilium.k8s.serviceHost }}
{{- $_ := set $computed "k8sServicePort" (int .Values.cilium.k8s.servicePort) }}
{{- $_ := set $computed "operator"        (dict "replicas" (int .Values.cilium.operatorReplicas)) }}
{{- $_ := set $computed "gatewayAPI"      (dict "enabled" .Values.cilium.gatewayAPI.enabled) }}
{{- $_ := set $computed "l2announcements" (dict "enabled" .Values.cilium.l2announcements.enabled) }}
{{- $_ := set $computed "externalIPs"     (dict "enabled" .Values.cilium.externalIPs.enabled) }}

{{- $extra := .Values.cilium.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: {{ .Values.cilium.chartVersion | quote }}
    helm:
      releaseName: cilium
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.cilium.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
