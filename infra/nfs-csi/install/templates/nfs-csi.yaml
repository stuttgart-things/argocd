{{- $computed := dict
    "serviceAccount" (dict "create" true "controller" "csi-nfs-controller-sa")
    "rbac"           (dict "create" true "name" "nfs")
    "driver"         (dict "name" "nfs.csi.k8s.io" "mountPermissions" 0)
    "feature"        (dict "enableFSGroupPolicy" true "enableInlineVolume" false)
    "kubeletDir"     "/var/lib/kubelet"
    "externalSnapshotter" (dict
        "enabled" .Values.externalSnapshotter.enabled
        "customResourceDefinitions" (dict "enabled" .Values.externalSnapshotter.customResourceDefinitions.enabled))
}}
{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-csi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
    chart: csi-driver-nfs
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: nfs-csi
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
