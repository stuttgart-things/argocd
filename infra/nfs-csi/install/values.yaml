---
# ArgoCD AppProject the rendered Application belongs to.
project: default

# Where the rendered Application deploys.
destination:
  server: https://kubernetes.default.svc
  namespace: kube-system

# Upstream csi-driver-nfs Helm chart version.
chartVersion: v4.13.1

# External snapshotter sidecar.
externalSnapshotter:
  enabled: true
  # Snapshot CRDs — keep off when another component (e.g. openebs-crds / snapshot-controller)
  # already installs cluster-wide VolumeSnapshot CRDs. Two owners of the same CRD breaks sync.
  customResourceDefinitions:
    enabled: false

# Deep-merged on top of the computed valuesObject passed to the upstream chart.
# Use for any upstream key not exposed as a first-class value above
# (driver.mountPermissions, feature.*, kubeletDir overrides, image pinning, etc.).
extraValues: {}

# Sync policy applied to the rendered Application.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m
