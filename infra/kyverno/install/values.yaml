---
# ArgoCD AppProject the rendered Application belongs to.
project: default

# Where the rendered Application deploys.
destination:
  server: https://kubernetes.default.svc
  namespace: kyverno

# Upstream kyverno/kyverno Helm chart version.
# renovate: datasource=helm depName=kyverno registryUrl=https://kyverno.github.io/kyverno/
chartVersion: 3.8.2

# Install Kyverno CRDs via the chart (ClusterPolicy, Policy, PolicyException, …).
installCRDs: true

# Deep-merged on top of the computed valuesObject passed to the upstream chart.
# Use for any upstream key not exposed as a first-class value above — e.g.
# `admissionController.replicas`, `backgroundController.resources`,
# `cleanupController.enabled`, feature gates, image overrides.
extraValues: {}

# Sync policy applied to the rendered Application.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    # Required: the policies.kyverno.io CRD is ~672KB, far over the 262KB
    # client-side apply limit, so it can only be applied server-side.
    - ServerSideApply=true
    # Honour the chart's ignoreDifferences during sync/selfHeal so it never
    # tries to rewrite the server-defaulted CRD/Job fields it can't change.
    - RespectIgnoreDifferences=true
    # NOTE: on clusters that strip managedFields (e.g. k3s), the CRDs may still
    # show as OutOfSync. ServerSideApply's diff needs managedFields to honour
    # ignoreDifferences; with none present the controller reports false-positive
    # diffs on spec.conversion / empty metadata.labels. This is cosmetic only —
    # Kyverno installs and runs Healthy. ServerSideDiff=true does NOT help (it
    # also needs managedFields). The real fix is cluster-side: retain
    # managedFields. The client-side diff (`argocd app diff --core`) is clean.
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m
