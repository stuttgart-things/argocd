{{- $computed := dict "crds" (dict "install" .Values.installCRDs) }}
{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
{{- $defaultName := printf "kyverno-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: kyverno
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  # Suppress permanent OutOfSync from server-side defaulted fields the upstream
  # chart doesn't set (Kyverno is otherwise Healthy). Verified diffs:
  #   * CRDs: the chart renders metadata.labels as an empty {} the live object
  #     lacks (ArgoCD won't normalise it away), and the API server defaults
  #     spec.conversion to {strategy: None} the chart omits.
  #   * kyverno-migrate-resources: a completed Helm post-upgrade hook Job; Jobs
  #     are immutable and the controller auto-populates selector/labels/defaults.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .metadata.labels
        - .spec.conversion
    - group: batch
      kind: Job
      name: kyverno-migrate-resources
      namespace: {{ .Values.destination.namespace | quote }}
      jqPathExpressions:
        - .spec.selector
        - .spec.completionMode
        - .spec.completions
        - .spec.manualSelector
        - .spec.parallelism
        - .spec.podReplacementPolicy
        - .spec.suspend
        - .spec.template.metadata.labels
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
