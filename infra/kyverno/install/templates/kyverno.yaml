{{- $computed := dict "crds" (dict "install" .Values.installCRDs) }}
{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
{{- $defaultName := printf "kyverno-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: kyverno
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
