{{- if .Values.httpRoute.enabled }}
{{- $defaultName := printf "backstage-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $routeValues := dict
      "namespace" .Values.destination.namespace
      "hostname"  .Values.httpRoute.hostname
      "gateway"   .Values.httpRoute.gateway
      "backend"   (dict "name" "backstage-deployment" "port" 7007)
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-httproute" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/backstage/httproute
    helm:
      releaseName: backstage-httproute
      valuesObject:
        {{- toYaml $routeValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
