{{- $defaultName := printf "rancher-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $fqdn := printf "%s.%s" .Values.hostname .Values.domain }}
{{- $computed := dict
      "hostname"  $fqdn
      "replicas"  .Values.replicas
      "tls"       .Values.tls
      "privateCA" .Values.privateCA
      "ingress"   (dict "enabled" .Values.ingress.enabled)
      "global"    (dict "cattle" (dict "psp" (dict "enabled" false)))
}}
{{- if .Values.bootstrapPassword }}
  {{- $_ := set $computed "bootstrapPassword" .Values.bootstrapPassword }}
{{- end }}
{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://releases.rancher.com/server-charts/stable
    chart: rancher
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: rancher
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
