{{- if not .Values.applicationSet.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.applicationName | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "run-things-collector.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "run-things-collector.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "run-things-collector.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName | quote }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Values.applicationName | quote }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          env:
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: SERVER_URL
              value: {{ .Values.server.url | quote }}
            - name: CLUSTER_ENDPOINT
              value: {{ .Values.clusterEndpoint | quote }}
            - name: REPORT_INTERVAL
              value: {{ .Values.reportInterval | quote }}
            - name: HEARTBEAT_INTERVAL
              value: {{ .Values.heartbeatInterval | quote }}
            - name: HTTP_TIMEOUT
              value: {{ .Values.httpTimeout | quote }}
            - name: NAMESPACES
              value: {{ .Values.namespaces | quote }}
            {{- if .Values.server.token }}
            - name: COLLECTOR_TOKEN
              value: {{ .Values.server.token | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}
