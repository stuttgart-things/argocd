{{- if .Values.httpRoute.enabled }}
{{- $routesValues := dict
      "namespace" .Values.destination.namespace
      "gateway" .Values.httpRoute.gateway
      "routes" (list
        (dict "name" "minio-console" "hostname" .Values.console.hostname "backend" (dict "name" "minio" "port" 9001))
        (dict "name" "minio-api"     "hostname" .Values.api.hostname     "backend" (dict "name" "minio" "port" 9000))
      )
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-httproute
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/minio/charts/httproute
    helm:
      releaseName: minio-httproute
      valuesObject:
        {{- toYaml $routesValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
