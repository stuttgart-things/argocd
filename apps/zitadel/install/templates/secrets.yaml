{{- if .Values.secretsApp.enabled }}
{{- $defaultName := printf "zitadel-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $secretsValues := dict
      "namespace"  .Values.destination.namespace
      "secretName" .Values.zitadel.masterkeySecretName
      "values"     .Values.secretsApp
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-secrets" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/zitadel/secrets
    helm:
      releaseName: zitadel-secrets
      valuesObject:
        {{- toYaml $secretsValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
