{{- if .Values.externalSecrets.enabled }}
{{- $defaultName := printf "zitadel-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $esValues := dict
      "namespace"       .Values.destination.namespace
      "secretName"      .Values.zitadel.masterkeySecretName
      "store"           .Values.externalSecrets.store
      "secretPath"      .Values.externalSecrets.secretPath
      "refreshInterval" .Values.externalSecrets.refreshInterval
      "keys"            (list "masterkey" "db-password" "db-admin-password")
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-external-secrets" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/zitadel/external-secrets
    helm:
      releaseName: zitadel-external-secrets
      valuesObject:
        {{- toYaml $esValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
