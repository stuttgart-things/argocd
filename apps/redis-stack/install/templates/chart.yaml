{{- $defaultName := printf "redis-stack-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $masterScript := `#!/usr/bin/dumb-init /bin/bash
### docker entrypoint script, for starting redis stack
BASEDIR=/opt/redis-stack
cd ${BASEDIR}
CMD=${BASEDIR}/bin/redis-server
if [ -z "${REDISEARCH_ARGS}" ]; then
REDISEARCH_ARGS="MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000"
fi
[[ -f $REDIS_PASSWORD_FILE ]] && export REDIS_PASSWORD="$(< "${REDIS_PASSWORD_FILE}")"
if [[ -f /opt/bitnami/redis/mounted-etc/master.conf ]];then
    cp /opt/bitnami/redis/mounted-etc/master.conf /opt/bitnami/redis/etc/master.conf
fi
if [[ -f /opt/bitnami/redis/mounted-etc/redis.conf ]];then
    cp /opt/bitnami/redis/mounted-etc/redis.conf /opt/bitnami/redis/etc/redis.conf
fi
${CMD} \
--port "${REDIS_PORT}" \
--requirepass "${REDIS_PASSWORD}" \
--masterauth "${REDIS_PASSWORD}" \
--include "/opt/bitnami/redis/etc/redis.conf" \
--include "/opt/bitnami/redis/etc/master.conf" \
--loadmodule /opt/redis-stack/lib/redisearch.so ${REDISEARCH_ARGS} \
--loadmodule /opt/redis-stack/lib/redistimeseries.so ${REDISTIMESERIES_ARGS} \
--loadmodule /opt/redis-stack/lib/rejson.so ${REDISJSON_ARGS} \
--loadmodule /opt/redis-stack/lib/redisbloom.so ${REDISBLOOM_ARGS}
` }}
{{- $replicaScript := `#!/usr/bin/dumb-init /bin/bash
BASEDIR=/opt/redis-stack
cd ${BASEDIR}
CMD=${BASEDIR}/bin/redis-server
get_port() {
    hostname="$1"
    type="$2"
    port_var=$(echo "${hostname^^}_SERVICE_PORT_$type" | sed "s/-/_/g")
    port=${!port_var}
    if [ -z "$port" ]; then
        case $type in
            "SENTINEL")
                echo 26379
                ;;
            "REDIS")
                echo 6379
                ;;
        esac
    else
        echo $port
    fi
}
get_full_hostname() {
    hostname="$1"
    echo "${hostname}.${HEADLESS_SERVICE}"
}
REDISPORT=$(get_port "$HOSTNAME" "REDIS")
[[ -f $REDIS_PASSWORD_FILE ]] && export REDIS_PASSWORD="$(< "${REDIS_PASSWORD_FILE}")"
[[ -f $REDIS_MASTER_PASSWORD_FILE ]] && export REDIS_MASTER_PASSWORD="$(< "${REDIS_MASTER_PASSWORD_FILE}")"
if [[ -f /opt/bitnami/redis/mounted-etc/replica.conf ]];then
    cp /opt/bitnami/redis/mounted-etc/replica.conf /opt/bitnami/redis/etc/replica.conf
fi
if [[ -f /opt/bitnami/redis/mounted-etc/redis.conf ]];then
    cp /opt/bitnami/redis/mounted-etc/redis.conf /opt/bitnami/redis/etc/redis.conf
fi
echo "" >> /opt/bitnami/redis/etc/replica.conf
echo "replica-announce-port $REDISPORT" >> /opt/bitnami/redis/etc/replica.conf
echo "replica-announce-ip $(get_full_hostname "$HOSTNAME")" >> /opt/bitnami/redis/etc/replica.conf
${CMD} \
--port "${REDIS_PORT}" \
--requirepass "${REDIS_PASSWORD}" \
--masterauth "${REDIS_PASSWORD}" \
--include "/opt/bitnami/redis/etc/redis.conf" \
--include "/opt/bitnami/redis/etc/replica.conf" \
--loadmodule /opt/redis-stack/lib/redisearch.so ${REDISEARCH_ARGS} \
--loadmodule /opt/redis-stack/lib/redistimeseries.so ${REDISTIMESERIES_ARGS} \
--loadmodule /opt/redis-stack/lib/rejson.so ${REDISJSON_ARGS} \
--loadmodule /opt/redis-stack/lib/redisbloom.so ${REDISBLOOM_ARGS}
` }}
{{- $mergedCm := dict
      "apiVersion" "v1"
      "kind" "ConfigMap"
      "metadata" (dict "name" "bitnami-redis-stack-server-merged")
      "data" (dict
        "start-master.sh"  $masterScript
        "start-replica.sh" $replicaScript
      )
}}
{{- $extraVolumes := list (dict
      "name" "merged-start-scripts"
      "configMap" (dict "name" "bitnami-redis-stack-server-merged" "defaultMode" 493)
) }}
{{- $extraVolumeMounts := list (dict
      "name" "merged-start-scripts"
      "mountPath" "/opt/bitnami/scripts/merged-start-scripts"
) }}
{{- $masterArgs := list "-c" "/opt/bitnami/scripts/merged-start-scripts/start-master.sh" }}
{{- $replicaArgs := list "-c" "/opt/bitnami/scripts/merged-start-scripts/start-replica.sh" }}
{{- $computed := dict
      "global" (dict "redis" (dict "password" .Values.auth.password))
      "image" (dict
        "registry"   .Values.image.registry
        "repository" .Values.image.repository
        "tag"        .Values.image.tag
      )
      "master" (dict
        "persistence" (dict
          "enabled"      .Values.persistence.enabled
          "storageClass" .Values.persistence.storageClass
          "size"         .Values.persistence.size
        )
        "args"              $masterArgs
        "extraVolumes"      $extraVolumes
        "extraVolumeMounts" $extraVolumeMounts
      )
      "replica" (dict
        "persistence" (dict
          "enabled"      .Values.persistence.enabled
          "storageClass" .Values.persistence.storageClass
          "size"         .Values.persistence.size
        )
        "replicaCount"      .Values.replicaCount
        "args"              $replicaArgs
        "extraVolumes"      $extraVolumes
        "extraVolumeMounts" $extraVolumeMounts
      )
      "extraDeploy" (list $mergedCm)
}}
{{- if .Values.sentinel.enabled }}
  {{- $_ := set $computed "sentinel" (dict
        "enabled"       true
        "masterSet"     .Values.sentinel.masterSet
        "quorum"        .Values.sentinel.quorum
        "parallelSyncs" .Values.sentinel.parallelSyncs
        "service"       (dict "type" .Values.sentinel.serviceType)
        "image"         (dict
          "registry"   .Values.sentinel.image.registry
          "repository" .Values.sentinel.image.repository
          "tag"        .Values.sentinel.image.tag
        )
  ) }}
{{- end }}
{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: ghcr.io/stuttgart-things/charts/redis
    chart: redis
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: redis-stack
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
