{{- if .Values.externalSecrets.enabled }}
{{- $defaultName := printf "machinery-catalog-locator-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{/* ESO ExternalSecret sub-Application — materializes the GitHub App PEM
Secret in the destination namespace BEFORE the workload (sync-wave -10), so
the catalog-locator Pod's volume mount has a file to read on first boot
instead of crashlooping. Reuses the generic external-secrets chart. */}}
{{- $esValues := dict
      "namespace"       .Values.destination.namespace
      "secretName"      .Values.externalSecrets.secretName
      "store"           .Values.externalSecrets.store
      "secretPath"      .Values.externalSecrets.secretPath
      "refreshInterval" .Values.externalSecrets.refreshInterval
      "keys"            .Values.externalSecrets.keys
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-external-secrets" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery-catalog-locator/external-secrets
    helm:
      releaseName: machinery-catalog-locator-external-secrets
      valuesObject:
        {{- toYaml $esValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
