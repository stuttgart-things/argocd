{{- if .Values.httpRoute.enabled }}
{{- $defaultName := printf "machinery-catalog-locator-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{/* Reuse the generic apps/machinery/httproute sub-chart — backend name/port
are parameterized, so it points at the catalog-locator Service on :8080.
nudgeAfterSync default on (matches the sub-chart); opt out per deployment. */}}
{{- $nudge := true }}
{{- if hasKey .Values.httpRoute "nudgeAfterSync" }}
{{-   $nudge = .Values.httpRoute.nudgeAfterSync }}
{{- end }}
{{- $routesValues := dict
      "namespace" .Values.destination.namespace
      "gateway" .Values.httpRoute.gateway
      "nudgeAfterSync" $nudge
      "routes" (list
        (dict "name" "machinery-catalog-locator" "hostname" .Values.httpRoute.hostname "backend" (dict "name" "machinery-catalog-locator" "port" 8080))
      )
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-httproute" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery/httproute
    helm:
      releaseName: machinery-catalog-locator-httproute
      valuesObject:
        {{- toYaml $routesValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
