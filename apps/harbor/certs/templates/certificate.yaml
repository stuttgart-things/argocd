---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-ingress-tls
  namespace: {{ .Values.namespace | quote }}
spec:
  commonName: {{ .Values.fqdn | quote }}
  dnsNames:
    - {{ .Values.fqdn | quote }}
    - {{ printf "*.%s" .Values.fqdn | quote }}
  secretName: {{ .Values.secretName | quote }}
  issuerRef:
    name: {{ .Values.issuer.name | quote }}
    kind: {{ .Values.issuer.kind | quote }}
