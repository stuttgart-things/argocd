---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: {{ .Values.namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
  hostnames:
    - {{ .Values.fqdn | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /v2/
        - path:
            type: PathPrefix
            value: /service/
        - path:
            type: PathPrefix
            value: /c/
        - path:
            type: PathPrefix
            value: /chartrepo/
        - path:
            type: PathPrefix
            value: /harbor/
      backendRefs:
        - name: harbor-core
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: harbor-portal
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-project-proxy
  namespace: {{ .Values.namespace | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
  hostnames:
    - {{ .Values.wildcard | quote }}
  rules:
    - backendRefs:
        - name: harbor-project-proxy
          port: 80
