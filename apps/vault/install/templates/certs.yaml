{{- if .Values.certs.enabled }}
{{- $defaultName := printf "vault-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $certsValues := dict
      "namespace"  .Values.destination.namespace
      "hostname"   .Values.certs.hostname
      "secretName" .Values.certs.secretName
      "issuer"     .Values.certs.issuer
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-certs" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/vault/certs
    helm:
      releaseName: vault-certs
      valuesObject:
        {{- toYaml $certsValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
