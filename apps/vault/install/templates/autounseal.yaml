{{- if .Values.autounseal.enabled }}
{{- $defaultName := printf "vault-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $unsealValues := dict
      "settings" (dict
        "vault_url"            .Values.autounseal.vaultURL
        "vault_label_selector" .Values.autounseal.labelSelector
      )
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-autounseal" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.autounseal.repoURL | quote }}
    chart: vault-autounseal
    targetRevision: {{ .Values.autounseal.chartVersion | quote }}
    helm:
      releaseName: vault-autounseal
      valuesObject:
        {{- toYaml $unsealValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
