{{- if .Values.nudgeAfterSync }}
{{- range .Values.routes }}
---
# Mirror of the HTTPRoute nudge hook in apps/machinery/httproute.
# Cilium's gateway-controller hits the same stale-`ResolvedRefs` race
# on freshly-created GRPCRoutes (same controller, same informer-cache
# ordering). See the httproute template for the architectural notes
# on why this is a Sync hook (not PostSync) — same Catch-22 applies.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-grpc-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: machinery-grpcroute-nudge
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: {{ printf "%s-grpc-nudge" .name | quote }}
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nudge
          # See the httproute nudge template for the comment on
          # why this is the `-dev` variant (the plain :latest is a
          # no-shell image and breaks the `sh -c` retry loop).
          image: cgr.dev/chainguard/kubectl:latest-dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Poll-and-annotate retry loop (180s deadline, 5s interval).
          # See stuttgart-things/argocd#164 and the matching loop in
          # apps/machinery/httproute/templates/nudge-hook.yaml.
          command:
            - /bin/sh
            - -c
            - |
              set -u
              NS={{ $.Values.namespace | quote }}
              NAME={{ .name | quote }}
              KIND=grpcroute
              DEADLINE=$(( $(date +%s) + 180 ))
              START=$(date +%s)
              while [ "$(date +%s)" -lt "$DEADLINE" ]; do
                kubectl -n "$NS" annotate "$KIND" "$NAME" --overwrite \
                  reconcile.machinery.stuttgart-things.com/nudged-at=$(date +%s) >/dev/null
                state=$(kubectl -n "$NS" get "$KIND" "$NAME" \
                  -o jsonpath='{.status.parents[0].conditions[?(@.type=="ResolvedRefs")].status}' 2>/dev/null || true)
                if [ "$state" = "True" ]; then
                  printf 'ResolvedRefs=True after %ss\n' "$(( $(date +%s) - START ))"
                  exit 0
                fi
                printf 'ResolvedRefs=%s; retrying in 5s\n' "${state:-<unknown>}"
                sleep 5
              done
              echo "Timed out after 180s waiting for ResolvedRefs=True" >&2
              exit 1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ printf "%s-grpc-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-grpc-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["grpcroutes"]
    resourceNames: [{{ .name | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-grpc-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-grpc-nudge" .name | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ printf "%s-grpc-nudge" .name | quote }}
    namespace: {{ $.Values.namespace | quote }}
{{- end }}
{{- end }}
