{{- $defaultName := printf "machinery-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{/*
Argo CD 2.13+ treats an `oci://`-prefixed repoURL as a kustomize OCI source
and any other prefix as git. Without the prefix Argo falls back to go-git
and reports "failed to list refs: repository not found", even for public
ghcr packages. Tolerate both forms in values so the user can't silently
mis-configure it. Mirrors the `homerun2.kustomizeRepo` helper.
*/}}
{{- $kustomizeRepo := .Values.kustomize.repoURL -}}
{{- if not (hasPrefix "oci://" $kustomizeRepo) -}}
{{- $kustomizeRepo = printf "oci://%s" $kustomizeRepo -}}
{{- end }}
{{/*
Build the Deployment container piecemeal so MACHINERY_CONFIG only appears
when there's actually a ConfigMap to point at. Without that gate,
machinery starts with MACHINERY_CONFIG=/etc/machinery/config.json, reads
it as a path, finds nothing, and crashes (`reading config file: open
/etc/machinery/config.json: no such file or directory`). The default
(unset) leaves machinery to run with its built-in defaultConfig().

Two opt-in paths:
  config.fromConfigMap: <name>   point at a ConfigMap created out-of-band
  config.content: <json string>  inline JSON, chart materializes a
                                 ConfigMap via the configmap sub-Application
*/}}
{{- $cmName := "" }}
{{- if .Values.config }}
{{-   if or .Values.config.content .Values.config.watch }}
{{/* Both `content` (raw JSON) and `watch` (catalog-assembled, see
_helpers.tpl) are materialized into a ConfigMap by config.yaml. */}}
{{-     $cmName = default "machinery-config-file" .Values.config.name }}
{{-   else if .Values.config.fromConfigMap }}
{{-     $cmName = .Values.config.fromConfigMap }}
{{-   end }}
{{- end }}
{{- $container := dict
      "name" "machinery"
      "image" (printf "%s:%s" .Values.image.repository .Values.image.tag)
      "ports" (list
        (dict "name" "grpc" "containerPort" 50051 "protocol" "TCP")
        (dict "name" "http" "containerPort" 8080  "protocol" "TCP")
      )
}}
{{- $podSpec := dict "containers" (list $container) }}
{{- $envVars := list }}
{{- $volumes := list }}
{{- $volumeMounts := list }}
{{- if $cmName }}
{{-   $envVars = append $envVars (dict "name" "MACHINERY_CONFIG" "value" "/etc/machinery/config.json") }}
{{-   $volumes = append $volumes (dict "name" "machinery-config" "configMap" (dict "name" $cmName)) }}
{{-   $volumeMounts = append $volumeMounts (dict
        "name"      "machinery-config"
        "mountPath" "/etc/machinery"
        "readOnly"  true
) }}
{{- end }}
{{/* Auth Secret mount (machinery#70/#71). When auth.tokenSecretRef.name
is set, append a read-only Secret volume + subPath mount. Independent
of the config ConfigMap mount; safe to stack. The matching tokenFile
in MACHINERY_CONFIG is rendered by config.yaml against the same
default mount path. */}}
{{- if and .Values.auth .Values.auth.enabled .Values.auth.tokenSecretRef .Values.auth.tokenSecretRef.name }}
{{-   $secretKey := default "token" .Values.auth.tokenSecretRef.key }}
{{-   $mountPath := default "/var/run/machinery-auth/token" .Values.auth.tokenMountPath }}
{{-   $volumes = append $volumes (dict
        "name" "auth-token"
        "secret" (dict
          "secretName" .Values.auth.tokenSecretRef.name
          "items" (list (dict "key" $secretKey "path" "token"))
        )
) }}
{{-   $volumeMounts = append $volumeMounts (dict
        "name"      "auth-token"
        "mountPath" $mountPath
        "subPath"   "token"
        "readOnly"  true
) }}
{{- end }}
{{- if $envVars }}{{- $_ := set $container "env" $envVars }}{{- end }}
{{- if $volumeMounts }}{{- $_ := set $container "volumeMounts" $volumeMounts }}{{- end }}
{{- if $volumes }}{{- $_ := set $podSpec "volumes" $volumes }}{{- end }}
{{- $deployPatch := dict
      "apiVersion" "apps/v1"
      "kind" "Deployment"
      "metadata" (dict "name" "machinery")
      "spec" (dict "template" (dict "spec" $podSpec))
}}
{{- $svcPatch := dict
      "apiVersion" "v1"
      "kind" "Service"
      "metadata" (dict "name" "machinery")
      "spec" (dict "ports" (list
        (dict "name" "grpc" "port" 50051 "targetPort" "grpc" "protocol" "TCP" "appProtocol" "kubernetes.io/h2c")
        (dict "name" "http" "port" 8080  "targetPort" "http" "protocol" "TCP")
      ))
}}
{{- $hrDelete := dict
      "apiVersion" "gateway.networking.k8s.io/v1"
      "kind" "HTTPRoute"
      "metadata" (dict "name" "machinery")
      "$patch" "delete"
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  # Without this, deleting the parent App leaves the workloads on the
  # destination cluster orphaned: the parent's finalizer prunes the child
  # Application CRDs from argocd ns instantly, taking their reference to
  # the destination resources with them. Finalizer here makes Argo prune
  # the kustomize-rendered Deployment/Service/etc. before this App is
  # removed.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ $kustomizeRepo | quote }}
    targetRevision: {{ .Values.kustomize.targetRevision | quote }}
    path: .
    kustomize:
      # The machinery-kustomize OCI base bakes `namespace: machinery` into
      # every resource (the KCL schema's default). Without overriding here,
      # Argo's destination.namespace is ignored for resources that carry
      # an explicit namespace, so they all land in `machinery` regardless
      # of what the consumer asked for — breaking per-PR previews (HTTPRoute
      # in pr-N can't reach Service in `machinery`) and colliding multiple
      # tenants. Kustomize's `namespace:` rewrites it on every resource
      # (and renames the Namespace object itself).
      namespace: {{ .Values.destination.namespace | quote }}
      patches:
        - target:
            kind: Deployment
            name: machinery
          patch: |
{{ toYaml $deployPatch | indent 12 }}
        - target:
            kind: Service
            name: machinery
          patch: |
{{ toYaml $svcPatch | indent 12 }}
        {{- if .Values.httpRoute.enabled }}
        - target:
            kind: HTTPRoute
            name: machinery
          patch: |
{{ toYaml $hrDelete | indent 12 }}
        {{- end }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
