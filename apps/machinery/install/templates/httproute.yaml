{{- if .Values.httpRoute.enabled }}
{{- $defaultName := printf "machinery-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{/* Pass nudgeAfterSync through to the sub-chart. Default on
(matches the sub-chart's own default); set httpRoute.nudgeAfterSync:
false in install values to disable the PostSync Job for long-lived
deployments where Cilium's cache is steady-state. */}}
{{- $nudge := true }}
{{- if hasKey .Values.httpRoute "nudgeAfterSync" }}
{{-   $nudge = .Values.httpRoute.nudgeAfterSync }}
{{- end }}
{{- $routesValues := dict
      "namespace" .Values.destination.namespace
      "gateway" .Values.httpRoute.gateway
      "nudgeAfterSync" $nudge
      "routes" (list
        (dict "name" "machinery" "hostname" .Values.httpRoute.hostname "backend" (dict "name" "machinery" "port" 8080))
      )
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-httproute" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  # See chart.yaml — without the finalizer the HTTPRoute on the
  # destination cluster is orphaned when the parent App is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery/httproute
    helm:
      releaseName: machinery-httproute
      valuesObject:
        {{- toYaml $routesValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
