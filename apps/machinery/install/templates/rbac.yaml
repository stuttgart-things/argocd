{{- if and .Values.rbac .Values.rbac.rules }}
{{- $defaultName := printf "machinery-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $roleName := default (printf "%s-reader" $appName) .Values.rbac.name }}
---
# ClusterRole + binding for the machinery ServiceAccount. The KCL base
# in machinery-kustomize ships only the ServiceAccount — without this
# Application, machinery's list/watch calls for anything outside the
# `view` aggregation come back forbidden, and the dashboard just
# error-loops. Cluster-scoped so a single binding covers whichever
# kinds `rbac.rules` enumerates.
#
# Sync-wave 0: same as the kustomize Application so the binding lands
# in the same pass that creates the SA.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-rbac" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery/rbac
    helm:
      releaseName: machinery-rbac
      valuesObject:
        name: {{ $roleName | quote }}
        serviceAccount:
          name: machinery
          namespace: {{ .Values.destination.namespace | quote }}
        rules:
          {{- toYaml .Values.rbac.rules | nindent 10 }}
  destination:
    # ClusterRole + ClusterRoleBinding are cluster-scoped; namespace is
    # ignored by the API server but Argo wants something here.
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
