{{- if and .Values.config .Values.config.content }}
{{- $defaultName := printf "machinery-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $cmName := default "machinery-config-file" .Values.config.name }}
---
# Materializes the ConfigMap that the Deployment patch in chart.yaml
# mounts at /etc/machinery. Runs at sync-wave -10 so the ConfigMap
# exists before the machinery Deployment is reconciled, otherwise the
# Pod boots with the volume mount but no file and crashloops while
# waiting for Argo to apply the ConfigMap on the next pass.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-config" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  # See chart.yaml — without the finalizer the ConfigMap on the
  # destination cluster is orphaned when the parent App is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery/configmap
    helm:
      releaseName: machinery-configmap
      valuesObject:
        name: {{ $cmName | quote }}
        content: {{ .Values.config.content | quote }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
