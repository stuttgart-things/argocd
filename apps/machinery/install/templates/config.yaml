{{/* Resolve the effective config JSON from either `config.content` (raw)
or `config.watch` (assembled from the .Values.kinds catalog). Empty
string => nothing to materialize here (machinery's defaultConfig, or an
external `config.fromConfigMap`). */}}
{{- $cfgJSON := include "machinery.configContent" . }}
{{- if $cfgJSON }}
{{- $defaultName := printf "machinery-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $cmName := default "machinery-config-file" .Values.config.name }}
{{/* Fold the structured `auth:` values block (machinery#56) into the
rendered config JSON when enabled. Keeps `config.content` as the
free-form catch-all; consumers can still inline auth there if they
prefer. The auth block only carries fields that are actually set, so
machinery's resolution order (token → tokenFile → tokenEnvVar →
$MACHINERY_AUTH_TOKEN) sees exactly what the caller chose. */}}
{{- if and .Values.auth .Values.auth.enabled }}
{{-   $parsed := fromJson $cfgJSON }}
{{-   $auth := dict "enabled" true }}
{{/* When tokenSecretRef is set, the chart auto-derives tokenFile from
tokenMountPath — the user shouldn't have to keep them in sync. Inline
`token` is dropped in this branch (would defeat the Secret mount). */}}
{{-   if and .Values.auth.tokenSecretRef .Values.auth.tokenSecretRef.name }}
{{-     $mountPath := default "/var/run/machinery-auth/token" .Values.auth.tokenMountPath }}
{{-     $_ := set $auth "tokenFile" (default $mountPath .Values.auth.tokenFile) }}
{{-   else }}
{{-     if .Values.auth.token }}{{- $_ := set $auth "token" .Values.auth.token }}{{- end }}
{{-     if .Values.auth.tokenFile }}{{- $_ := set $auth "tokenFile" .Values.auth.tokenFile }}{{- end }}
{{-   end }}
{{-   if .Values.auth.tokenEnvVar }}{{- $_ := set $auth "tokenEnvVar" .Values.auth.tokenEnvVar }}{{- end }}
{{-   $_ := set $parsed "auth" $auth }}
{{-   $cfgJSON = toJson $parsed }}
{{- end }}
---
# Materializes the ConfigMap that the Deployment patch in chart.yaml
# mounts at /etc/machinery. Runs at sync-wave -10 so the ConfigMap
# exists before the machinery Deployment is reconciled, otherwise the
# Pod boots with the volume mount but no file and crashloops while
# waiting for Argo to apply the ConfigMap on the next pass.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-config" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  # See chart.yaml — without the finalizer the ConfigMap on the
  # destination cluster is orphaned when the parent App is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery/configmap
    helm:
      releaseName: machinery-configmap
      valuesObject:
        name: {{ $cmName | quote }}
        content: {{ $cfgJSON | quote }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
