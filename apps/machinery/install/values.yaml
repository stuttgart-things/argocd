---
# Reference back to this catalog repo — used by the httpRoute Application
# to load apps/machinery/httproute from git.
catalog:
  repoURL: https://github.com/stuttgart-things/argocd.git
  targetRevision: HEAD

# ArgoCD AppProject all rendered Applications belong to.
project: default

# Where all rendered Applications deploy.
destination:
  server: https://kubernetes.default.svc
  namespace: machinery

# Machinery OCI kustomize base (ghcr.io/stuttgart-things/machinery-kustomize).
# The chart prepends `oci://` automatically if missing — Argo CD 2.13+ needs
# the prefix to treat the repoURL as a kustomize OCI source rather than git
# (without it Argo reports "failed to list refs: repository not found").
# NOTE: both the kustomize base and the image are tagged v-prefixed (vX.Y.Z)
# in ghcr — a bare `1.13.2` is a 404. Keep kustomize and image on the SAME
# release; the base's KCL schema and the binary move together.
kustomize:
  repoURL: ghcr.io/stuttgart-things/machinery-kustomize
  targetRevision: v1.13.2

# Machinery container image — patched into the Deployment rendered by the base.
image:
  repository: ghcr.io/stuttgart-things/machinery
  tag: v1.13.3

# Optional MACHINERY_CONFIG. Three opt-in paths:
#
#   config.watch          The "smart" path. A flat list of kind names from
#                         the `kinds:` catalog below — e.g. [AnsibleRun].
#                         The chart assembles BOTH the MACHINERY_CONFIG JSON
#                         and the matching ClusterRole rules (rbac) from the
#                         one catalog entry, so the two can never drift. Add
#                         a kind to the list and its list/watch permission
#                         comes along automatically. Prefer this.
#
#   config.content        Inline JSON. The chart materializes a ConfigMap
#                         (via the apps/machinery/configmap sub-Application)
#                         in the destination namespace, then patches the
#                         Deployment to mount it. Escape hatch for kinds not
#                         in the catalog; you must supply matching rbac.rules
#                         yourself. Takes precedence over `watch`.
#
#   config.fromConfigMap  Name of a ConfigMap with a `config.json` key,
#                         materialized out-of-band (Kyverno generate,
#                         ESO, pre-applied YAML, …). The chart only does
#                         the mount + env-var.
#
# Drop-in JSON examples live in stuttgart-things/machinery's
# `examples/configs/`. Leave the block empty (the default) to run with
# machinery's built-in defaultConfig().
config: {}
  # watch:                         # preferred: list kind names from the `kinds:` catalog below
  #   - AnsibleRun
  #   - HarvesterVM
  # name: machinery-config-file    # name of the materialized ConfigMap (defaults to machinery-config-file; must NOT collide with the env-vars ConfigMap `machinery-config` the KCL base ships)
  # content: |                     # escape hatch: inline JSON; chart auto-creates the ConfigMap (you own the matching rbac.rules)
  #   {"port":50051,"resources":{...}}
  # fromConfigMap: my-overrides    # alternative: reference an externally-managed ConfigMap

# Optional cluster-scoped RBAC for the machinery ServiceAccount. The KCL
# base in machinery-kustomize ships only the SA, so machinery has no read
# access to most resources by default and the dashboard error-loops on
# any configured kind.
#
# When you use `config.watch`, the chart already derives the matching
# (apiGroups, resources) rules from the catalog — you do NOT list them
# here. Use `rbac.rules` only to ADD permissions on top (e.g. for a kind
# pulled in via `config.content`, or an extra resource). The two sets are
# unioned. Leave `rules` empty to add nothing.
rbac:
  rules: []
  # rules:
  #   - apiGroups: ["cert-manager.io"]
  #     resources: ["certificates"]
  #   - apiGroups: ["external-secrets.io"]
  #     resources: ["externalsecrets"]

# Gateway API HTTPRoute sub-Application (opt-in).
# When enabled, the base's KCL-generated HTTPRoute is pruned via $patch: delete.
#
# nudgeAfterSync: render a PostSync Job per route that re-annotates
# the HTTPRoute after each Argo sync. Works around Cilium gateway-
# controller's tendency to latch onto a stale BackendNotFound when
# it reconciles before the backend Service is in its informer cache.
# Default on — surfaced on every fresh preview env spin-up. Set to
# `false` for long-lived deployments where the cache is steady-state
# and you don't want a Job + SA + Role + Binding per sync.
httpRoute:
  enabled: true
  hostname: machinery.example.com
  gateway:
    name: cilium-gateway
    namespace: default
  nudgeAfterSync: true

# Gateway API GRPCRoute sub-Application (opt-in).
# Sibling to httpRoute — same shape, but the rendered route points at
# machinery's gRPC port (50051) so CLIs and other in-cluster services
# can dial the ResourceService through the gateway. Disabled by
# default; preview envs (machinery-pr-*) flip it on.
grpcRoute:
  enabled: false
  hostname: machinery-grpc.example.com
  gateway:
    name: cilium-gateway
    namespace: default
  nudgeAfterSync: true

# Optional gRPC bearer-token auth on the network side
# (stuttgart-things/machinery#56). Opt-in; default off.
#
# When `enabled: true`, the chart folds these fields into the rendered
# MACHINERY_CONFIG JSON as the `auth` block.
#
# Two ways to supply the token:
#
#   tokenSecretRef.name (RECOMMENDED for production) — chart patches the
#     Deployment to mount an externally-managed Secret as a read-only file
#     and sets `auth.tokenFile` in MACHINERY_CONFIG to the mount path. The
#     token never lands in a ConfigMap.
#
#   token (preview/dev) — inline value is folded directly into the
#     MACHINERY_CONFIG ConfigMap. Simplest path; visible to anyone with
#     namespace read.
#
# Token resolution at the machinery side: `token` → `tokenFile` →
# `$tokenEnvVar` → `$MACHINERY_AUTH_TOKEN`. Set only the field you
# actually want machinery to use.
#
# In-process callers (HTMX frontend) bypass the interceptor by
# construction; `/grpc.health.v1.Health/*` stays anonymous so probes
# keep working.
auth:
  enabled: false
  # token: ""        # inline; test/dev/preview only
  # tokenFile: ""    # explicit path; only set if NOT using tokenSecretRef (then it's auto-derived)
  # tokenEnvVar: ""  # custom env var name; defaults to MACHINERY_AUTH_TOKEN
  # tokenSecretRef:        # Secret-backed mount (production path)
  #   name: machinery-auth   # name of an out-of-band-materialized Secret in destination.namespace
  #   key: token             # key in the Secret carrying the token bytes (default: token)
  # tokenMountPath: /var/run/machinery-auth/token   # where to mount the file inside the Pod (default shown)

# Sync policy applied to all rendered Applications.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m

# ---------------------------------------------------------------------------
# Kind catalog — the single source of truth for `config.watch`.
#
# Each entry is one watchable kind, keyed by the display name machinery
# shows in the dashboard. The value is machinery's per-kind resource block
# verbatim (group/version/resource + optional connectionField/statusFields/
# infoFields — see stuttgart-things/machinery's examples/configs/README.md).
#
# A consumer references entries by name via `config.watch`. From that one
# list the chart derives BOTH:
#   * the MACHINERY_CONFIG `resources` map (config.yaml), and
#   * the ClusterRole rules — apiGroups: [<group>], resources: [<resource>]
#     (rbac.yaml).
# So config and RBAC are guaranteed to stay in lockstep.
#
# Field-path note: dot-paths must match the LIVE object. The fields below
# were taken from the actual CRDs/XRDs, not aspirational schemas.
kinds:
  # stuttgart-things Crossplane v2 XRs (resources.stuttgart-things.com)
  AnsibleRun:
    group: resources.stuttgart-things.com
    version: v1alpha1
    resource: ansibleruns
    connectionField: status.pipelineRunName
    statusFields:
      - status.succeeded
      - status.installed
      - status.reason
    infoFields:
      - { label: Playbooks,  path: spec.ansiblePlaybooks }
      - { label: Target,     path: spec.ansibleTargetHost }
      - { label: Namespace,  path: spec.namespace }
      - { label: GitRepo,    path: spec.gitRepoUrl }
      - { label: Message,    path: status.message }
      - { label: Started,    path: status.startTime }
      - { label: Completed,  path: status.completionTime }
  HarvesterVM:
    group: resources.stuttgart-things.com
    version: v1alpha1
    resource: harvestervms
    connectionField: status.vm.name
    statusFields:
      - status.volume.ready
      - status.cloudInit.ready
      - status.vm.ready
  VsphereVM:
    group: resources.stuttgart-things.com
    version: v1alpha1
    resource: vspherevms
    connectionField: status.share.ip
    statusFields:
      - status.share.ip
  StoragePlatform:
    group: resources.stuttgart-things.com
    version: v1alpha1
    resource: storageplatforms
    statusFields:
      - status.installed
      - status.observedVersion
  NetworkIntegration:
    group: resources.stuttgart-things.com
    version: v1alpha1
    resource: networkintegrations
    statusFields:
      - status.installed
      - status.observedVersion
  SecurityPlatform:
    group: resources.stuttgart-things.com
    version: v1alpha1
    resource: securityplatforms
    statusFields:
      - status.installed
      - status.observedVersion
  # Platform-services kinds (present on most clusters)
  Certificate:
    group: cert-manager.io
    version: v1
    resource: certificates
    connectionField: status.notAfter
    statusFields:
      - status.renewalTime
    infoFields:
      - { label: Issuer,     path: spec.issuerRef.name }
      - { label: CommonName, path: spec.commonName }
      - { label: Expires,    path: status.notAfter }
      - { label: Renews,     path: status.renewalTime }
  ExternalSecret:
    group: external-secrets.io
    version: v1
    resource: externalsecrets
    connectionField: status.refreshTime
    statusFields:
      - status.syncedResourceVersion
    infoFields:
      - { label: Store,     path: spec.secretStoreRef.name }
      - { label: Target,    path: spec.target.name }
      - { label: Refreshed, path: status.refreshTime }
  HTTPRoute:
    group: gateway.networking.k8s.io
    version: v1
    resource: httproutes
    connectionField: spec.hostnames
    infoFields:
      - { label: Parent, path: spec.parentRefs }
  GRPCRoute:
    group: gateway.networking.k8s.io
    version: v1
    resource: grpcroutes
    connectionField: spec.hostnames
    infoFields:
      - { label: Parent, path: spec.parentRefs }
