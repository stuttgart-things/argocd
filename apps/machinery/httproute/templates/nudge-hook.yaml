{{- if .Values.nudgeAfterSync }}
{{- range .Values.routes }}
---
# Cilium's gateway-controller occasionally latches a stale
# ResolvedRefs=False/BackendNotFound verdict on a freshly-created
# HTTPRoute: it reconciles before the backend Service makes it into
# the controller's informer cache and never retries (no Service-watch
# on routes already in that state). Argo sync-waves only order
# `kubectl apply`, not controller-cache hydration, so the race is
# real even though every individual sync looks healthy.
#
# A Job that re-annotates the HTTPRoute is the smallest fix we can
# ship at the Argo layer — the annotation bumps resourceVersion →
# Cilium re-reconciles → finds the backend.
#
# **Sync** hook (not PostSync) on purpose: PostSync would wait for
# the route to be Healthy before firing, but the route can't reach
# Healthy without this nudge — a Catch-22 that left preview envs
# stuck for hours (stuttgart-things/argocd#164 first attempted a
# PostSync retry loop in #168; this version moves to Sync after
# observing the deadlock on machinery-pr-71).
#
# The container's retry loop tolerates the route not existing yet
# (early iterations may hit "Error: NotFound" on annotate; those
# print to stderr and the loop continues until ResolvedRefs=True
# or the 180s deadline elapses).
#
# Hook-delete-policy: HookSucceeded keeps the cluster clean of stale
# Jobs after each sync; only the latest failure (if any) sticks
# around for debugging.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: machinery-httproute-nudge
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: {{ printf "%s-nudge" .name | quote }}
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nudge
          # Chainguard kubectl image. The cluster pulls cgr.dev for
          # machinery's own base (cgr.dev/chainguard/static), so the
          # registry is known-reachable. `bitnami/kubectl` was the
          # initial choice but Broadcom shrunk Bitnami's free catalog
          # in early 2026 and stripped version-only tags, leaving
          # `:1.31` 404. `:latest` here tracks Chainguard's tip,
          # which is fine for an ephemeral PostSync nudge — no API
          # surface to break.
          image: cgr.dev/chainguard/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Poll-and-annotate loop instead of a one-shot annotate. The
          # PostSync hook fires after the Application reports Healthy,
          # which can be ~2 minutes after the route resource lands —
          # long enough that callers hitting the preview URL see 502s
          # before the first annotate. Each iteration re-annotates
          # (forcing Cilium to re-reconcile) then checks ResolvedRefs;
          # exits 0 once True or fails after 180s. See
          # stuttgart-things/argocd#164.
          command:
            - /bin/sh
            - -c
            - |
              set -u
              NS={{ $.Values.namespace | quote }}
              NAME={{ .name | quote }}
              KIND=httproute
              DEADLINE=$(( $(date +%s) + 180 ))
              START=$(date +%s)
              while [ "$(date +%s)" -lt "$DEADLINE" ]; do
                kubectl -n "$NS" annotate "$KIND" "$NAME" --overwrite \
                  reconcile.machinery.stuttgart-things.com/nudged-at=$(date +%s) >/dev/null
                state=$(kubectl -n "$NS" get "$KIND" "$NAME" \
                  -o jsonpath='{.status.parents[0].conditions[?(@.type=="ResolvedRefs")].status}' 2>/dev/null || true)
                if [ "$state" = "True" ]; then
                  printf 'ResolvedRefs=True after %ss\n' "$(( $(date +%s) - START ))"
                  exit 0
                fi
                printf 'ResolvedRefs=%s; retrying in 5s\n' "${state:-<unknown>}"
                sleep 5
              done
              echo "Timed out after 180s waiting for ResolvedRefs=True" >&2
              exit 1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ printf "%s-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    resourceNames: [{{ .name | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-nudge" .name | quote }}
  namespace: {{ $.Values.namespace | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-nudge" .name | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ printf "%s-nudge" .name | quote }}
    namespace: {{ $.Values.namespace | quote }}
{{- end }}
{{- end }}
