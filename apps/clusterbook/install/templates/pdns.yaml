{{- if .Values.pdns.enabled }}
{{- $defaultName := printf "clusterbook-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
{{- $pdnsValues := dict
      "namespace" .Values.destination.namespace
      "token"     .Values.pdns.token
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-pdns" $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/clusterbook/pdns
    helm:
      releaseName: clusterbook-pdns
      valuesObject:
        {{- toYaml $pdnsValues | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
