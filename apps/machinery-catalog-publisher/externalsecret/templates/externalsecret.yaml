---
# Materializes `{{ .Values.secretName }}` with the S3_* keys the publisher reads
# via envFrom. Vault supplies the credentials; endpoint/region/insecure are
# written as literals through the target template, so the one Secret carries
# everything the connection needs.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName | quote }}
  namespace: {{ .Values.namespace | quote }}
spec:
  refreshInterval: {{ .Values.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.secretStoreRef.kind | quote }}
    name: {{ .Values.secretStoreRef.name | quote }}
  target:
    name: {{ .Values.secretName | quote }}
    creationPolicy: Owner
    template:
      type: Opaque
      # ESO Go-template — the {{ "{{ .accessKey }}" }} / {{ "{{ .secretKey }}" }}
      # refs resolve against the `data:` entries below at sync time. (Escaped so
      # Helm passes them through literally.)
      data:
        S3_ENDPOINT: {{ .Values.endpoint | quote }}
        S3_REGION: {{ .Values.region | quote }}
        S3_INSECURE_SKIP_VERIFY: {{ .Values.insecureSkipVerify | quote }}
        S3_ACCESS_KEY: "{{ `{{ .accessKey }}` }}"
        S3_SECRET_KEY: "{{ `{{ .secretKey }}` }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: {{ .Values.vault.secret | quote }}
        property: {{ .Values.vault.accessKeyProperty | quote }}
    - secretKey: secretKey
      remoteRef:
        key: {{ .Values.vault.secret | quote }}
        property: {{ .Values.vault.secretKeyProperty | quote }}
