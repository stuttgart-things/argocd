{{- if .Values.connectionSecretExternal.enabled }}
{{/*
Optional ExternalSecret sub-Application: self-provisions the S3/MinIO
connection Secret (.Values.connectionSecret) in the destination namespace from
Vault, so a preview env doesn't need the Secret projected in out-of-band.
sync-wave -1 → created before the workload (wave 0) so envFrom resolves.
*/}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-secret" (include "publisher.appName" .) | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery-catalog-publisher/externalsecret
    helm:
      releaseName: {{ printf "%s-secret" (include "publisher.appName" .) | quote }}
      valuesObject:
        secretName: {{ .Values.connectionSecret | quote }}
        namespace: {{ .Values.destination.namespace | quote }}
        refreshInterval: {{ .Values.connectionSecretExternal.refreshInterval | quote }}
        secretStoreRef:
          kind: {{ .Values.connectionSecretExternal.secretStoreRef.kind | quote }}
          name: {{ .Values.connectionSecretExternal.secretStoreRef.name | quote }}
        endpoint: {{ .Values.connectionSecretExternal.endpoint | quote }}
        region: {{ .Values.connectionSecretExternal.region | quote }}
        insecureSkipVerify: {{ .Values.connectionSecretExternal.insecureSkipVerify | quote }}
        vault:
          secret: {{ .Values.connectionSecretExternal.vault.secret | quote }}
          accessKeyProperty: {{ .Values.connectionSecretExternal.vault.accessKeyProperty | quote }}
          secretKeyProperty: {{ .Values.connectionSecretExternal.vault.secretKeyProperty | quote }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
