{{- if .Values.httpRoute.enabled }}
{{/*
Optional metrics/health HTTPRoute, rendered as a sibling Application sourcing
apps/machinery-catalog-publisher/httproute from this catalog repo. Gives the
headless publisher a browsable preview URL (→ /healthz, /metrics).
*/}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-httproute" (include "publisher.appName" .) | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/machinery-catalog-publisher/httproute
    helm:
      releaseName: {{ printf "%s-httproute" (include "publisher.appName" .) | quote }}
      valuesObject:
        namespace: {{ .Values.destination.namespace | quote }}
        hostname: {{ .Values.httpRoute.hostname | quote }}
        gateway:
          name: {{ .Values.httpRoute.gateway.name | quote }}
          namespace: {{ .Values.httpRoute.gateway.namespace | quote }}
        service:
          name: machinery-catalog-publisher
          port: 8080
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
