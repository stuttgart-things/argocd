{{- if .Values.omniPitcher.enabled }}
{{- $name := "homerun2-omni-pitcher" }}
{{- $ns := .Values.destination.namespace }}
{{- $repo := .Values.omniPitcher.kustomizeRepo | default "ghcr.io/stuttgart-things/homerun2-omni-pitcher-kustomize" }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-omni-pitcher" .Release.Name | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    homerun2.sthings.io/component: omni-pitcher
    homerun2.sthings.io/preview: "true"
    homerun2.sthings.io/pr-number: {{ .Values.pr.number | quote }}
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ $repo | quote }}
    targetRevision: {{ .Values.omniPitcher.version | quote }}
    path: .
    kustomize:
      patches:
        - target:
            kind: Ingress
            name: {{ $name }}
          patch: |
{{ include "omni-pitcher.deletePatch" (dict "apiVersion" "networking.k8s.io/v1" "kind" "Ingress" "name" $name) | indent 12 }}
        - target:
            kind: Deployment
            name: {{ $name }}
          patch: |
{{ include "omni-pitcher.imagePatch" (dict "name" $name "tag" .Values.omniPitcher.version) | indent 12 }}
        - target:
            kind: Secret
            name: {{ printf "%s-token" $name }}
          patch: |
{{ include "omni-pitcher.authTokenPatch" (dict "secretName" (printf "%s-token" $name) "token" .Values.authToken) | indent 12 }}
        - target:
            kind: Secret
            name: {{ printf "%s-redis" $name }}
          patch: |
{{ include "omni-pitcher.redisPasswordPatch" (dict "secretName" (printf "%s-redis" $name) "password" .Values.redisPassword) | indent 12 }}
        - target:
            kind: Deployment
            name: {{ $name }}
          patch: |
{{ include "omni-pitcher.redisAddrPatch" (dict "name" $name "namespace" $ns "extraEnv" list) | indent 12 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ $ns | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
