{{- $values := .Values -}}
{{- $project := .Values.project -}}
{{- range .Values.stages }}
{{- $stageName := .name -}}
{{- $appName := include "homerun2-kargo.applicationName" (dict "Values" $values "env" $stageName) -}}
{{- $valuesPath := include "homerun2-kargo.envValuesPath" (dict "Values" $values "env" $stageName) }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: {{ $stageName | quote }}
  namespace: {{ $project | quote }}
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: {{ $values.warehouse.name | quote }}
      sources:
        {{- if .direct }}
        # Pulls newest discovered freight directly from the Warehouse.
        direct: true
        {{- else }}
        # Promotes only freight already validated as Healthy on upstream Stage(s).
        stages:
        {{- range .sourceStages }}
          - {{ . | quote }}
        {{- end }}
        {{- end }}
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: {{ $values.envValuesRepo.url | quote }}
            checkout:
              - branch: {{ $values.envValuesRepo.branch | quote }}
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/{{ $valuesPath }}
            updates:
            {{- with $values.warehouse.subscriptions.omniPitcher }}
            {{- if .enabled }}
              - key: omniPitcher.version
                value: ${{ "{{" }} imageFrom({{ .repoURL | quote }}).Tag {{ "}}" }}
            {{- end }}
            {{- end }}
            {{- with $values.warehouse.subscriptions.coreCatcher }}
            {{- if .enabled }}
              - key: coreCatcher.version
                value: ${{ "{{" }} imageFrom({{ .repoURL | quote }}).Tag {{ "}}" }}
              # core-catcher's image tag and kustomize OCI tag bump together —
              # both keys must update in the same yaml-update step.
              - key: coreCatcher.kustomizeVersion
                value: ${{ "{{" }} imageFrom({{ .repoURL | quote }}).Tag {{ "}}" }}
            {{- end }}
            {{- end }}
            {{- with $values.warehouse.subscriptions.scout }}
            {{- if .enabled }}
              - key: scout.version
                value: ${{ "{{" }} imageFrom({{ .repoURL | quote }}).Tag {{ "}}" }}
            {{- end }}
            {{- end }}
        - as: commit
          uses: git-commit
          config:
            path: ./repo
            # Kargo's git-commit step in 1.9.x requires a literal `message`;
            # the older `messageFromSteps` field has been removed. Reference
            # the Freight via the expression context so each commit names
            # what got promoted.
            message: "chore({{ $stageName }}): promote freight ${{ "{{" }} ctx.promotion {{ "}}" }}"
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: {{ $appName | quote }}
                sources:
                  - repoURL: {{ $values.envValuesRepo.url | quote }}
                    # Kargo 1.9.x replaced `desiredCommitFromStep: <step>` with
                    # `desiredRevision: <expression>`. We point at the commit
                    # produced by the `commit` step (git-commit, aliased above)
                    # so Argo CD waits for ITS Application to converge on the
                    # exact SHA Kargo just pushed.
                    desiredRevision: ${{ "{{" }} outputs.commit.commit {{ "}}" }}
  {{- if .verify }}
  # Verification — see templates/analysistemplate.yaml for why this is
  # wired even though the AnalysisTemplate is a no-op. Without it, Kargo
  # 1.9.6's Stage controller doesn't mark freight verifiedIn[<stage>],
  # which blocks dev→staging→prod freight propagation.
  verification:
    analysisTemplates:
      - name: noop-pass
  {{- end }}
{{- end }}
