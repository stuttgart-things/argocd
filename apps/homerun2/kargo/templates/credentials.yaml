{{- if .Values.credentials.git.externalSecret.enabled }}
---
# Git push credential — Kargo discovers it by the `kargo.akuity.io/cred-type:
# git` label, then matches its `repoURL` field against the URL the
# promotion's `git-clone` step requests. The PAT must have `contents: write`
# on the env-values repo so `git-push` can land the values-file bump.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "homerun2-kargo.credSecretName" (dict "project" .Values.project "type" "git") | quote }}
  namespace: {{ .Values.project | quote }}
spec:
  refreshInterval: {{ .Values.credentials.git.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.credentials.git.externalSecret.secretStoreName | quote }}
    kind: {{ .Values.credentials.git.externalSecret.secretStoreKind | quote }}
  target:
    name: {{ include "homerun2-kargo.credSecretName" (dict "project" .Values.project "type" "git") | quote }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          kargo.akuity.io/cred-type: git
      data:
        repoURL: {{ .Values.credentials.git.externalSecret.repoURL | quote }}
        username: "{{ "{{" }} .username {{ "}}" }}"
        password: "{{ "{{" }} .password {{ "}}" }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.credentials.git.externalSecret.vaultPath | quote }}
        property: {{ .Values.credentials.git.externalSecret.vaultKeyUsername | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.credentials.git.externalSecret.vaultPath | quote }}
        property: {{ .Values.credentials.git.externalSecret.vaultKeyPassword | quote }}
{{- end }}
{{- if .Values.credentials.ghcr.externalSecret.enabled }}
---
# GHCR read credential — Kargo's Warehouse uses it to list image tags on
# `ghcr.io/stuttgart-things/*`. `kargo.akuity.io/cred-type: image` matches
# image subscriptions (use `helm` for chart subscriptions, `git` for git).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "homerun2-kargo.credSecretName" (dict "project" .Values.project "type" "ghcr") | quote }}
  namespace: {{ .Values.project | quote }}
spec:
  refreshInterval: {{ .Values.credentials.ghcr.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.credentials.ghcr.externalSecret.secretStoreName | quote }}
    kind: {{ .Values.credentials.ghcr.externalSecret.secretStoreKind | quote }}
  target:
    name: {{ include "homerun2-kargo.credSecretName" (dict "project" .Values.project "type" "ghcr") | quote }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          kargo.akuity.io/cred-type: image
      data:
        repoURL: {{ .Values.credentials.ghcr.externalSecret.repoURL | quote }}
        username: "{{ "{{" }} .username {{ "}}" }}"
        password: "{{ "{{" }} .password {{ "}}" }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.credentials.ghcr.externalSecret.vaultPath | quote }}
        property: {{ .Values.credentials.ghcr.externalSecret.vaultKeyUsername | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.credentials.ghcr.externalSecret.vaultPath | quote }}
        property: {{ .Values.credentials.ghcr.externalSecret.vaultKeyPassword | quote }}
{{- end }}
