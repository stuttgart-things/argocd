{{- if .Values.secrets.enabled }}
{{- $appName := include "homerun2.appName" . }}
{{- /* Build the components list from which components are enabled. Each
       redis-consuming component whose `redisPassword` is empty gets a
       `<name>-redis` ExternalSecret. Always include the omni-pitcher
       token + redis-stack-auth Secrets (omni-pitcher is the gateway, and
       redis-stack itself reads from the auth Secret via `existingSecret`). */}}
{{- $components := list }}
{{- if .Values.omniPitcher.enabled }}
  {{- $components = append $components (dict "name" "omni-pitcher-token" "secretName" "homerun2-omni-pitcher-token" "dataKey" "auth-token" "vaultProperty" "authToken") }}
  {{- $components = append $components (dict "name" "omni-pitcher-redis" "secretName" "homerun2-omni-pitcher-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.redisStack.enabled }}
  {{- $components = append $components (dict "name" "redis-stack-auth" "secretName" "redis-stack-auth" "dataKey" "redis-password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.coreCatcher.enabled }}
  {{- $components = append $components (dict "name" "core-catcher-redis" "secretName" "homerun2-core-catcher-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.scout.enabled }}
  {{- $components = append $components (dict "name" "scout-redis" "secretName" "homerun2-scout-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.lightCatcher.enabled }}
  {{- $components = append $components (dict "name" "light-catcher-redis" "secretName" "homerun2-light-catcher-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.ledCatcher.enabled }}
  {{- $components = append $components (dict "name" "led-catcher-redis" "secretName" "homerun2-led-catcher-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.gitPitcher.enabled }}
  {{- $components = append $components (dict "name" "git-pitcher-redis" "secretName" "homerun2-git-pitcher-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
{{- if .Values.demoPitcher.enabled }}
  {{- $components = append $components (dict "name" "demo-pitcher-redis" "secretName" "homerun2-demo-pitcher-redis" "dataKey" "password" "vaultProperty" "redisPassword") }}
{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-secrets" $appName | quote }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Sync ahead of the component Applications — they reference the
    # materialised Secrets by name at Pod start, so the ExternalSecrets
    # must reconcile first.
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/homerun2/secrets
    helm:
      releaseName: {{ printf "%s-secrets" $appName | quote }}
      valuesObject:
        namespace: {{ .Values.destination.namespace | quote }}
        clusterSecretStoreName: {{ .Values.secrets.clusterSecretStoreName | quote }}
        vaultSecretName: {{ .Values.secrets.vaultSecretName | quote }}
        refreshInterval: {{ .Values.secrets.refreshInterval | quote }}
        components:
          {{- toYaml $components | nindent 10 }}
  destination:
    {{- if .Values.destination.name }}
    name: {{ .Values.destination.name | quote }}
    {{- else }}
    server: {{ .Values.destination.server | quote }}
    {{- end }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
