{{- if .Values.redisStack.enabled }}
{{- $appName := include "homerun2.appName" . }}
{{/*
auth — start with the inline password from `.Values.redisPassword` (Flux /
single-cluster path). If `.Values.redisStack.auth.existingSecret` is set,
add it; Bitnami prefers existingSecret when both fields are present. This
lets ESO/CSI-managed Secret consumers (e.g. the PR-preview policy that
generates `redis-stack-auth` per namespace) wire the password without
embedding a literal in valuesObject.
*/}}
{{- $auth := dict "password" .Values.redisPassword }}
{{- with .Values.redisStack.auth }}
  {{- if .existingSecret }}
    {{- $_ := set $auth "existingSecret" .existingSecret }}
    {{- $_ := set $auth "existingSecretPasswordKey" (default "redis-password" .existingSecretPasswordKey) }}
  {{- end }}
{{- end }}
{{- $rsValues := dict
      "project"      .Values.project
      "applicationName" (printf "%s-redis-stack-delegate" $appName)
      "destination"  .Values.destination
      "chartVersion" .Values.redisStack.chartVersion
      "auth"         $auth
      "image"        .Values.redisStack.image
      "sentinel"     (dict
        "enabled"       true
        "masterSet"     "mymaster"
        "quorum"        1
        "parallelSyncs" 1
        "serviceType"   .Values.redisStack.serviceType
        "image"         .Values.redisStack.sentinel
      )
      "persistence" .Values.redisStack.persistence
      "syncPolicy"  .Values.syncPolicy
}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-redis-stack" $appName | quote }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.catalog.repoURL | quote }}
    targetRevision: {{ .Values.catalog.targetRevision | quote }}
    path: apps/redis-stack/install
    helm:
      releaseName: homerun2-redis-stack
      valuesObject:
        {{- toYaml $rsValues | nindent 8 }}
  # The wrapper Application is itself an Argo CRD — it must land where Argo
  # runs (the management cluster), in the `argocd` namespace. The delegated
  # Application chart (`apps/redis-stack/install`) receives the workload
  # destination via valuesObject.destination above and applies redis-stack
  # there. Single-cluster Argo: in-cluster == workload, so this is the same
  # destination either way. Cross-cluster: this hardcoded in-cluster value
  # is correct, `.Values.destination.server` would be wrong.
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
