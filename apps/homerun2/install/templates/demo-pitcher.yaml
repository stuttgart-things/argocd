{{- if .Values.demoPitcher.enabled }}
{{- $appName := include "homerun2.appName" . }}
{{- $name := "homerun2-demo-pitcher" }}
{{- $ns := .Values.destination.namespace }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-demo-pitcher" $appName | quote }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ include "homerun2.kustomizeRepo" "demo-pitcher" | quote }}
    targetRevision: {{ .Values.demoPitcher.version | quote }}
    path: .
    kustomize:
      namespace: {{ $ns | quote }}
      patches:
        - target:
            kind: Ingress
            name: {{ $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "networking.k8s.io/v1" "kind" "Ingress" "name" $name) | indent 12 }}
{{- if .Values.demoPitcher.inlineHttpRoute }}
        # Option B from stuttgart-things/argocd#116 — kustomize OCI ships the
        # HTTPRoute alongside Service so they land atomically. Patch parentRef
        # + hostname per env; the standalone httproute child Application no
        # longer renders demo-pitcher (see templates/httproute.yaml).
        - target:
            group: gateway.networking.k8s.io
            version: v1
            kind: HTTPRoute
            name: {{ $name }}
          patch: |-
{{ include "homerun2.httpRouteJSONPatch" (dict "gateway" .Values.httpRoute.gateway "hostname" .Values.demoPitcher.hostname) | indent 12 }}
{{- else }}
        - target:
            kind: HTTPRoute
            name: {{ $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "gateway.networking.k8s.io/v1" "kind" "HTTPRoute" "name" $name) | indent 12 }}
{{- end }}
        - target:
            kind: Deployment
            name: {{ $name }}
          patch: |
{{ include "homerun2.imagePatch" (dict "name" $name "tag" .Values.demoPitcher.version) | indent 12 }}
{{- if .Values.authToken }}
        - target:
            kind: Secret
            name: {{ printf "%s-token" $name }}
          patch: |
{{ include "homerun2.authTokenPatch" (dict "secretName" (printf "%s-token" $name) "token" .Values.authToken) | indent 12 }}
{{- else }}
        - target:
            kind: Secret
            name: {{ printf "%s-token" $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "v1" "kind" "Secret" "name" (printf "%s-token" $name)) | indent 12 }}
{{- end }}
{{- if .Values.redisPassword }}
        - target:
            kind: Secret
            name: {{ printf "%s-redis" $name }}
          patch: |
{{ include "homerun2.redisPasswordPatch" (dict "secretName" (printf "%s-redis" $name) "password" .Values.redisPassword) | indent 12 }}
{{- else }}
        - target:
            kind: Secret
            name: {{ printf "%s-redis" $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "v1" "kind" "Secret" "name" (printf "%s-redis" $name)) | indent 12 }}
{{- end }}
        - target:
            kind: Deployment
            name: {{ $name }}
          patch: |
{{- $demoExtraEnv := list }}
{{- if .Values.demoPitcher.omniPitcherUrl }}
{{- /* Flip /pitch from RedisPitcher → HTTPPitcher posting at the given
       omni-pitcher endpoint. Strategic-merge merges container env by
       name, so PITCH_TARGET=http overrides the KCL-baked default (redis)
       and OMNI_PITCHER_URL gets added. OMNI_PITCHER_API_PATH=pitch so
       demo-pitcher's HTTPPitcher (URL = <endpoint>/<api-path>) hits
       omni-pitcher's actual generic route at /pitch — the demo-pitcher
       default "generic" produces /generic which 404s on omni-pitcher.
       AUTH_TOKEN comes from the ESO-managed homerun2-demo-pitcher-token
       Secret (same auth-token data key as omni-pitcher's own token Secret,
       both populated by Vault preview-env.authToken via the preview-secrets
       policy) so demo's "Authorization: Bearer …" header matches what
       omni-pitcher's authMiddleware expects.
       See stuttgart-things/argocd#116 2026-05-17 smoke comments. */ -}}
{{- $demoExtraEnv = list
      (dict "name" "PITCH_TARGET" "value" "http")
      (dict "name" "OMNI_PITCHER_URL" "value" .Values.demoPitcher.omniPitcherUrl)
      (dict "name" "OMNI_PITCHER_API_PATH" "value" "pitch")
      (dict "name" "AUTH_TOKEN" "valueFrom" (dict "secretKeyRef" (dict "name" (printf "%s-token" $name) "key" "auth-token")))
}}
{{- end }}
{{ include "homerun2.redisAddrPatch" (dict "name" $name "namespace" $ns "extraEnv" $demoExtraEnv) | indent 12 }}
  destination:
    {{- if .Values.destination.name }}
    name: {{ .Values.destination.name | quote }}
    {{- else }}
    server: {{ .Values.destination.server | quote }}
    {{- end }}
    namespace: {{ $ns | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
