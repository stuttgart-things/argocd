{{- if .Values.omniPitcher.enabled }}
{{- $appName := include "homerun2.appName" . }}
{{- $name := "homerun2-omni-pitcher" }}
{{- $ns := .Values.destination.namespace }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-omni-pitcher" $appName | quote }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ include "homerun2.kustomizeRepo" "omni-pitcher" | quote }}
    targetRevision: {{ .Values.omniPitcher.version | quote }}
    path: .
    kustomize:
      namespace: {{ $ns | quote }}
      patches:
        - target:
            kind: Ingress
            name: {{ $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "networking.k8s.io/v1" "kind" "Ingress" "name" $name) | indent 12 }}
        # Patch the HTTPRoute that omni-pitcher's kustomize OCI now ships
        # (since stuttgart-things/homerun2-omni-pitcher#125, v1.12.0+).
        # When httpRoute.enabled is true, override parentRefs + hostnames;
        # when false (no Gateway API on the target cluster), delete it.
        # Replaces the per-route entry the standalone `apps/homerun2/httproute`
        # chart used to render for omni-pitcher — eliminates the
        # cross-Application race with Cilium's gateway controller (#116).
{{- if .Values.httpRoute.enabled }}
        - target:
            kind: HTTPRoute
            name: {{ $name }}
          patch: |
{{ include "homerun2.httpRoutePatch" (dict "name" $name "hostname" .Values.omniPitcher.hostname "gateway" .Values.httpRoute.gateway) | indent 12 }}
{{- else }}
        - target:
            kind: HTTPRoute
            name: {{ $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "gateway.networking.k8s.io/v1" "kind" "HTTPRoute" "name" $name) | indent 12 }}
{{- end }}
        - target:
            kind: Deployment
            name: {{ $name }}
          patch: |
{{ include "homerun2.imagePatch" (dict "name" $name "tag" .Values.omniPitcher.version) | indent 12 }}
{{- if .Values.authToken }}
        - target:
            kind: Secret
            name: {{ printf "%s-token" $name }}
          patch: |
{{ include "homerun2.authTokenPatch" (dict "secretName" (printf "%s-token" $name) "token" .Values.authToken) | indent 12 }}
{{- else }}
        - target:
            kind: Secret
            name: {{ printf "%s-token" $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "v1" "kind" "Secret" "name" (printf "%s-token" $name)) | indent 12 }}
{{- end }}
{{- if .Values.redisPassword }}
        - target:
            kind: Secret
            name: {{ printf "%s-redis" $name }}
          patch: |
{{ include "homerun2.redisPasswordPatch" (dict "secretName" (printf "%s-redis" $name) "password" .Values.redisPassword) | indent 12 }}
{{- else }}
        - target:
            kind: Secret
            name: {{ printf "%s-redis" $name }}
          patch: |
{{ include "homerun2.deletePatch" (dict "apiVersion" "v1" "kind" "Secret" "name" (printf "%s-redis" $name)) | indent 12 }}
{{- end }}
        - target:
            kind: Deployment
            name: {{ $name }}
          patch: |
{{ include "homerun2.redisAddrPatch" (dict "name" $name "namespace" $ns "extraEnv" list) | indent 12 }}
  destination:
    {{- if .Values.destination.name }}
    name: {{ .Values.destination.name | quote }}
    {{- else }}
    server: {{ .Values.destination.server | quote }}
    {{- end }}
    namespace: {{ $ns | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
{{- end }}
