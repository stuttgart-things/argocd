---
# Target namespace where the ExternalSecrets are created (and where the
# materialised Secrets land). Set by the install chart's
# `destination.namespace` when consumed as a sub-Application.
namespace: homerun2

# ClusterSecretStore the ExternalSecrets reference. Must already exist on
# the workload cluster (provisioned out-of-band — see
# infra/external-secrets components + cluster-secret-store-vault catalog).
clusterSecretStoreName: vault-homerun2-pr

# How often each ExternalSecret re-pulls from Vault. Steady-state envs
# don't churn secrets the way per-PR previews do, so the default is much
# higher than the preview chart (1m → 1h).
refreshInterval: 1h

# Name of the Vault KV secret under the ClusterSecretStore's `path`.
# `homerun2-pr/preview-env` carries `redisPassword` + `authToken` already
# — dev can reuse those out of the box. Override for staging/prod when
# their own KV paths exist.
vaultSecretName: preview-env

# Per-component ExternalSecrets to render. Shape mirrors the per-namespace
# generator in apps/homerun2/preview-secrets, minus the Kyverno wrapper —
# here the namespace is fixed and known at render time, so a plain
# ExternalSecret per entry is enough.
components:
  - name: omni-pitcher-token
    secretName: homerun2-omni-pitcher-token
    dataKey: auth-token
    vaultProperty: authToken
  - name: omni-pitcher-redis
    secretName: homerun2-omni-pitcher-redis
    dataKey: password
    vaultProperty: redisPassword
  # redis-stack auth Secret consumed by the Bitnami chart's
  # `auth.existingSecret` path. Key MUST be `redis-password` (Bitnami's
  # default `auth.existingSecretPasswordKey`); change both if overriding.
  - name: redis-stack-auth
    secretName: redis-stack-auth
    dataKey: redis-password
    vaultProperty: redisPassword
