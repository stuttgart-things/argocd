---
# Name of the rendered ClusterPolicy.
name: homerun2-preview-quota

# Namespace name glob — every namespace matching this gets a ResourceQuota +
# LimitRange auto-generated by Kyverno (including existing ones, via
# `generateExisting: true`). Default matches the PR-preview ApplicationSet's
# namespace pattern.
namespacePrefix: "homerun2-pr-*"

# ResourceQuota — caps aggregate resource use across each matched namespace.
quota:
  requestsCpu: "2"
  requestsMemory: 2Gi
  limitsCpu: "4"
  limitsMemory: 4Gi
  pods: "10"

# LimitRange — defaults applied to any container without explicit
# requests/limits. Caps total: a container can't request/limit more than
# `default*` here unless it explicitly sets values within the ResourceQuota.
limitRange:
  defaultRequestCpu: 50m
  defaultRequestMemory: 64Mi
  defaultLimitCpu: 500m
  defaultLimitMemory: 512Mi
