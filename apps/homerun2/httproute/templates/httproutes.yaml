{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name | quote }}
      namespace: {{ $.Values.gateway.namespace | quote }}
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .backend.name | quote }}
          port: {{ .backend.port }}
{{- end }}
