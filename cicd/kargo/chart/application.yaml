---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: ghcr.io/akuity/kargo-charts
    chart: kargo
    targetRevision: 1.9.6
    helm:
      releaseName: kargo
      valuesObject:
        api:
          host: kargo.example.com
          adminAccount:
            passwordHash: "" # pragma: allowlist secret
            tokenSigningKey: "" # pragma: allowlist secret
            tokenTTL: 24h
          service:
            type: ClusterIP
          tls:
            enabled: false
          ingress:
            enabled: false
        controller:
          logLevel: INFO
        webhooksServer:
          tls:
            selfSignedCert: true
        garbageCollector:
          logLevel: INFO
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
