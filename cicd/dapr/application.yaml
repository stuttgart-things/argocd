---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dapr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dapr.github.io/helm-charts/
    chart: dapr
    targetRevision: 1.17.4
    helm:
      releaseName: dapr
      valuesObject:
        global:
          ha:
            enabled: false
          logAsJson: true
        dapr_operator:
          logLevel: info
        dapr_placement:
          logLevel: info
        dapr_sidecar_injector:
          logLevel: info
        dapr_scheduler:
          logLevel: info
  destination:
    server: https://kubernetes.default.svc
    namespace: dapr-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
