---
# ArgoCD AppProject the rendered Application belongs to.
project: default

# Where the rendered Application deploys.
destination:
  server: https://kubernetes.default.svc
  namespace: dapr-system

# Upstream dapr/dapr Helm chart version.
chartVersion: "1.17.4"

# Global chart flags. `ha.enabled: false` → single-replica control-plane;
# set to `true` for production (3 replicas per component).
global:
  ha:
    enabled: false
  logAsJson: true

# Per-component log levels (debug / info / warn / error).
logLevel:
  operator: info
  placement: info
  sidecarInjector: info
  scheduler: info

# Deep-merged on top of the computed valuesObject passed to the upstream chart.
# Use for any upstream key not exposed as a first-class value above
# (resources, nodeSelector, mTLS config, extra env, etc.).
extraValues: {}

# Sync policy applied to the rendered Application.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m
