---
# Crossplane Provider packages to install.
#
# Each entry under `providers`:
#   name:       Provider resource name
#   package:    full xpkg reference including tag
#   apiVersion: optional — defaults to pkg.crossplane.io/v1
#   rbac:       optional. When set, the chart additionally emits:
#                 1. a DeploymentRuntimeConfig pinning the provider Pod to a
#                    stable ServiceAccount name (= the Provider name), so that
#                    bindings written against it survive package upgrades, and
#                 2. a ClusterRoleBinding granting `rbac.clusterRole` to that
#                    SA in `crossplane-system`.
#               Needed when the provider talks to the local Kubernetes API via
#               `InjectedIdentity` ProviderConfig (helm/kubernetes/opentofu) —
#               without it, every Composition fails with `forbidden`. Drop the
#               `rbac` field on providers that don't talk to the local API
#               (cloud providers using Secret-based creds), or pick a tighter
#               ClusterRole than `cluster-admin` if your security posture
#               requires it.
#
# Defaults cover the stuttgart-things baseline (helm + kubernetes + opentofu).
# Single-package providers go in this list. For cloud-family providers that
# publish one xpkg per service (AWS, Azure, GCP), prefer a dedicated family
# block — see `awsFamily` below — to avoid listing every service by hand.
providers:
  - name: provider-helm
    package: xpkg.upbound.io/crossplane-contrib/provider-helm:v1.2.0
    rbac:
      clusterRole: cluster-admin
  # provider-kubernetes is intentionally NOT installed explicitly here: every
  # crossplane-configurations Configuration `dependsOn` it, so Crossplane pulls
  # it as a transitive dependency (Provider crossplane-contrib-provider-kubernetes
  # from xpkg.crossplane.io). Installing it explicitly too creates a SECOND lock
  # node for the same source → "node ... already exists" → the package resolver
  # freezes for every Configuration. Manage it via dependsOn only (same rule as
  # the Configuration building blocks). See crossplane-configurations CLAUDE.md.
  - name: provider-opentofu
    package: xpkg.upbound.io/upbound/provider-opentofu:v1.1.2
    rbac:
      clusterRole: cluster-admin
  # stuttgart-things provider managing remote kubeconfigs from SOPS-encrypted
  # Git repos. No `rbac` block: it declares its own permissions via the package
  # metadata (spec.permissions.rules + safe-start), which Crossplane grants to
  # the provider ServiceAccount — unlike the contrib helm/kubernetes providers
  # above, which need the cluster-admin binding for their InjectedIdentity SA.
  - name: provider-kubeconfig
    package: ghcr.io/stuttgart-things/provider-kubeconfig-xpkg:v0.13.0

# AWS family sugar. Upbound publishes one xpkg per AWS service under
# xpkg.upbound.io/upbound/provider-aws-<service>:<version>. Each enabled
# service expands to a `provider-aws-<service>` Provider CR pinned to
# `version`. Disabled by default — opt in per cluster. AWS providers use
# Secret-based credentials (not InjectedIdentity), so no RBAC binding is
# emitted for them.
awsFamily:
  enabled: false
  version: v1.1.0
  services: []
