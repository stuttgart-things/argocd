---
# ArgoCD AppProject the rendered Application belongs to.
project: default

# Where the rendered Application deploys.
destination:
  server: https://kubernetes.default.svc
  namespace: crossplane-system

# Upstream crossplane/crossplane Helm chart version.
# renovate: datasource=helm depName=crossplane registryUrl=https://charts.crossplane.io/stable
chartVersion: "2.3.3"

# Crossplane runtime args.
#   --enable-usages      exposes the Usage API
#   --enable-operations  alpha; required for Operations, CronOperations and
#                        WatchOperations APIs. Safe to leave on — the
#                        controllers only act when matching CRs exist.
args:
  - "--debug"
  - "--enable-usages"
  - "--enable-operations"

# Provider packages installed via this chart's pass-through to the upstream
# `crossplane/crossplane` chart's `provider.packages` field. Left empty by
# default — install providers through the separate `cicd/crossplane/providers`
# chart so providers can be bumped independently of Crossplane core. Override
# here only for one-off setups that don't use the providers chart.
providerPackages: []

# Deep-merged on top of the computed valuesObject passed to the upstream chart.
# Use for any upstream key not exposed above (resources, nodeSelector, image
# pinning, registryCaBundleConfig, etc.).
extraValues: {}

# Sync policy applied to the rendered Application.
# sync-wave: -10 so Crossplane CRDs (Provider, Function, Configuration, etc.)
# land before dependent CRs in functions/ and configs/.
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  retry:
    limit: 5
    backoff:
      duration: 10s
      factor: 2
      maxDuration: 3m
