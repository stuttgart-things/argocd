---
# Crossplane ProviderConfig / ClusterProviderConfig resources to install.
#
# Each provider ships its own ProviderConfig CRD (the apiGroup is unique
# per provider), so this chart can't usefully abstract them — it just emits
# them opaquely from a values list. Schemas vary per provider; consult the
# provider's docs for the spec shape.
#
# Each entry under `configs`:
#   name:       resource name (typically `in-cluster` — matches the
#               `providerConfigRef: in-cluster` convention used in the
#               stuttgart-things Compositions)
#   namespace:  optional. Only honored for namespaced kinds; ignored for
#               cluster-scoped kinds like `ClusterProviderConfig`.
#   apiVersion: e.g. kubernetes.m.crossplane.io/v1alpha1
#   kind:       optional, defaults to `ProviderConfig`. Use
#               `ClusterProviderConfig` for the v2 namespaced API surface
#               (`*.m.crossplane.io`) — that's what the namespaced
#               `Object` (kubernetes.m.crossplane.io/v1alpha1) references.
#   spec:       the provider-specific spec body
#
# Defaults cover the baseline providers shipped by cicd/crossplane/providers
# (helm + kubernetes), both targeting the cluster Crossplane runs in via
# `InjectedIdentity` — zero secrets, works out of the box. Only the v2
# namespaced (m.*) ClusterProviderConfig kinds are emitted: the v1
# non-namespaced ProviderConfigs are consumed only by the cluster-scoped
# Object (kubernetes.crossplane.io/v1alpha2), which the v2 namespaced XR
# default can't compose. For cloud-credentialed providers
# (provider-aws-*, provider-azure-*, …) replace this list or append entries
# with `spec.credentials.source: Secret` + your own secretRef. The
# referenced Secret is the consumer's responsibility (ESO, SOPS, etc.).
configs:
  - name: in-cluster
    apiVersion: helm.m.crossplane.io/v1beta1
    kind: ClusterProviderConfig
    spec:
      credentials:
        source: InjectedIdentity
  - name: in-cluster
    apiVersion: kubernetes.m.crossplane.io/v1alpha1
    kind: ClusterProviderConfig
    spec:
      credentials:
        source: InjectedIdentity
  # provider-opentofu has no `InjectedIdentity` mode — every entry needs a
  # `configuration` (the terraform/tofu HCL the provider runs). The default
  # below ships an empty `credentials` list + a kubernetes backend that
  # stores state in-cluster (no cloud creds wired up). It's a valid skeleton
  # but does nothing useful until the consumer adds a provider block + creds.
  # See https://github.com/upbound/provider-opentofu/blob/main/examples/namespaced/clusterproviderconfig.yaml
  # for the GCP-credentialed shape.
  - name: in-cluster
    apiVersion: opentofu.m.upbound.io/v1beta1
    kind: ClusterProviderConfig
    spec:
      credentials: []
      configuration: |
        terraform {
          backend "kubernetes" {
            secret_suffix     = "clusterproviderconfig-in-cluster"
            namespace         = "crossplane-system"
            in_cluster_config = true
          }
        }

  # provider-kubeconfig (kubeconfig.stuttgart-things.com) — NOT shipped by
  # default. It manages remote kubeconfigs from a SOPS-encrypted Git repo, so
  # every config is consumer-specific: it references a SOPS age-key Secret
  # (and, for private repos, a git-credentials Secret) that must already exist
  # in crossplane-system. Baking it into the shared baseline would render a
  # broken ClusterProviderConfig on every cluster missing those Secrets.
  #
  # Wire it up per-cluster: copy the block below into your consumer
  # Application's `helm.values` (under `configs:`), set your repo URL/branch,
  # and land the referenced Secret(s) via SOPS/ESO. Drop `git.secretRef` for a
  # public repo. See the provider's examples/provider/{config,config-private-repo}.yaml.
  #
  # - name: default
  #   apiVersion: kubeconfig.stuttgart-things.com/v1alpha1
  #   kind: ClusterProviderConfig
  #   spec:
  #     git:
  #       url: https://github.com/my-org/my-cluster-configs.git
  #       branch: main
  #       secretRef:                      # omit for a public repo
  #         name: git-credentials
  #         namespace: crossplane-system
  #     decryption:
  #       provider: sops
  #       secretRef:
  #         name: age-key
  #         namespace: crossplane-system
