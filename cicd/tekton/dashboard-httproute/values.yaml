---
# List of HTTPRoutes to render. Empty by default — consumers declare the routes
# they actually need (typically one for the Tekton Dashboard) with real
# hostnames and parentRefs per cluster.
#
# Each entry:
#   name:       HTTPRoute name
#   namespace:  HTTPRoute namespace (usually `tekton-pipelines`)
#   parentRefs: list of Gateway parentRefs; each at minimum { name, namespace }
#   hostnames:  list of DNS hostnames the route answers to
#   rules:      raw gateway.networking.k8s.io/v1 HTTPRouteRule list, passed through
#
# See README.md for a copy-paste Dashboard route entry.
httpRoutes: []
