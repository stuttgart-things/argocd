{{- $extra := .Values.extraValues | default dict }}
{{- $defaultName := printf "kro-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: registry.k8s.io/kro/charts
    chart: kro
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: kro
      {{- if $extra }}
      valuesObject:
        {{- toYaml $extra | nindent 8 }}
      {{- end }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
