{{- $computed := dict
    "installCRDs"                 .Values.installCRDs
    "keepCRDs"                    .Values.keepCRDs
    "clusterInstall"              .Values.clusterInstall
    "createClusterAggregateRoles" .Values.createClusterAggregateRoles
    "controller" (dict
        "replicas" (int .Values.controller.replicas)
        "logging"  .Values.controller.logging
        "metrics"  (dict
            "enabled"        .Values.controller.metrics.enabled
            "serviceMonitor" (dict "enabled" .Values.controller.metrics.serviceMonitor.enabled)))
    "providerRBAC" (dict
        "enabled"   .Values.providerRBAC.enabled
        "providers" (dict "gatewayAPI" .Values.providerRBAC.gatewayAPI))
    "dashboard" (dict
        "enabled"  .Values.dashboard.enabled
        "readonly" .Values.dashboard.readonly
        "replicas" (int .Values.dashboard.replicas)
        "service"  (dict "type" "ClusterIP" "port" 3100 "targetPort" 3100)
        "ingress"  (dict "enabled" false))
}}
{{- $extra := .Values.extraValues | default dict }}
{{- $merged := mergeOverwrite $computed (deepCopy $extra) }}
{{- $defaultName := printf "argo-rollouts-%s" (sha1sum .Values.destination.server | trunc 8) }}
{{- $appName := .Values.applicationName | default $defaultName }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName | quote }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: {{ .Values.chartVersion | quote }}
    helm:
      releaseName: argo-rollouts
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
  destination:
    server: {{ .Values.destination.server | quote }}
    namespace: {{ .Values.destination.namespace | quote }}
  syncPolicy:
    {{- toYaml .Values.syncPolicy | nindent 4 }}
